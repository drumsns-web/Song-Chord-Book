<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Song Chord Book</title>
  <link rel="icon" href="icon.png" type="image/png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020714;
      --navy: #07143a;
      --navy-2: #0d2466;
      --panel: rgba(8, 22, 58, .78);
      --panel-2: rgba(255, 255, 255, .08);
      --line: rgba(198, 222, 255, .18);
      --text: #f7fbff;
      --muted: #9eb6d8;
      --cyan: #28f2ee;
      --cyan-2: #72ffff;
      --paper: #fbfdff;
      --ink: #10204b;
      --chord-color: #007c89;
      --card-chord-color: #0d2466;
      --lyric-color: #243a68;
      --section-color: #052a70;
      --rhythm-color: #d8662a;
      --shadow: 0 28px 80px rgba(0, 0, 0, .36);
      --radius: 8px;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 22% 0%, rgba(50, 84, 255, .48), transparent 34%),
        radial-gradient(circle at 82% 22%, rgba(40, 242, 238, .16), transparent 28%),
        linear-gradient(135deg, #020714 0%, #07143a 42%, #020714 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.75), transparent 82%);
    }

    button,
    select,
    textarea,
    input {
      font: inherit;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255, 255, 255, .08);
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(40, 242, 238, .58);
      background: rgba(40, 242, 238, .12);
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(310px, 390px) minmax(0, 1fr);
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(3, 10, 31, .92), rgba(6, 18, 50, .84));
      backdrop-filter: blur(18px);
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .brand {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand img {
      width: 74px;
      height: 74px;
      border-radius: 19px;
      box-shadow: 0 18px 34px rgba(0, 0, 0, .36), 0 0 28px rgba(40, 242, 238, .2);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin: 16px 0;
    }

    label {
      color: #bfd1f0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      outline: none;
    }

    select,
    input {
      min-height: 42px;
      padding: 8px 10px;
    }

    select option {
      color: #07143a;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
      padding: 12px;
      line-height: 1.55;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
    }

    .transpose-card {
      border: 1px solid rgba(40, 242, 238, .24);
      border-radius: var(--radius);
      padding: 16px;
      background:
        linear-gradient(145deg, rgba(40, 242, 238, .14), rgba(255,255,255,.04)),
        rgba(255,255,255,.04);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .2);
    }

    .key-flow {
      display: grid;
      grid-template-columns: 1fr 54px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .song-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .song-stat {
      min-height: 64px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .07);
      text-align: center;
    }

    .song-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .song-stat strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      line-height: 1;
    }

    .key-box {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .08);
    }

    .key-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
    }

    .key-box strong {
      display: block;
      margin-top: 4px;
      font-size: 34px;
      line-height: 1;
    }

    .arrow {
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--cyan);
      color: #06214a;
      font-size: 32px;
      font-weight: 900;
      box-shadow: 0 0 26px rgba(40, 242, 238, .55);
    }

    .stepper,
    .view-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .view-switch {
      grid-template-columns: repeat(3, 1fr);
    }

    .source-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .builder {
      border: 1px solid rgba(40, 242, 238, .2);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255, 255, 255, .05);
    }

    .builder-grid {
      display: grid;
      gap: 8px;
    }

    .builder-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .builder-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .builder-actions button,
    .builder-row button {
      padding-inline: 10px;
      white-space: nowrap;
    }

    .color-settings {
      border: 1px solid rgba(198, 222, 255, .18);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255, 255, 255, .045);
    }

    .color-settings .source-actions {
      grid-template-columns: 1fr;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .color-field {
      display: grid;
      grid-template-columns: 1fr 42px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    input[type="color"] {
      min-height: 34px;
      padding: 3px;
      cursor: pointer;
    }

    .picker-panel {
      display: none;
      gap: 10px;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(198, 222, 255, .18);
      border-radius: var(--radius);
      background: rgba(2, 7, 20, .36);
    }

    .picker-panel.open {
      display: grid;
    }

    .picker-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .picker-buttons,
    .rhythm-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .picker-buttons button,
    .rhythm-buttons button {
      min-height: 34px;
      padding: 5px 6px;
      font-size: 12px;
      font-weight: 800;
    }

    .picker-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--cyan);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-weight: 900;
    }

    .grid16 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .grid-mode {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .grid-cell {
      min-height: 36px;
      padding: 6px;
      text-align: center;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
    }

    .grid-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .grid-dot,
    .sheet-grid-dot {
      color: rgba(13, 36, 102, .28);
      font-weight: 900;
    }

    button.primary,
    button.active {
      border-color: transparent;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-2));
      color: #041733;
      font-weight: 850;
      box-shadow: 0 0 22px rgba(40, 242, 238, .32);
    }

    .toolbar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .title-block {
      min-width: 0;
    }

    .title-block h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 64px);
      line-height: .98;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 10px 0 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .sheet {
      overflow: hidden;
      border: 1px solid rgba(198, 222, 255, .22);
      border-radius: 12px;
      background: rgba(255,255,255,.07);
      box-shadow: var(--shadow);
    }

    .section {
      display: grid;
      grid-template-columns: 138px minmax(0, 1fr);
      border-top: 1px solid rgba(198, 222, 255, .16);
    }

    .section:first-child {
      border-top: 0;
    }

    .section-name {
      padding: 18px 16px;
      color: #dce9ff;
      font-weight: 900;
      background: rgba(255, 255, 255, .06);
      border-right: 1px solid rgba(198, 222, 255, .16);
    }

    .bars {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: rgba(255, 255, 255, .035);
    }

    .bar-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(178px, 1fr));
      gap: 10px;
    }

    .lyric-row {
      display: block;
      margin: 2px 0 4px;
    }

    .lyric-line,
    .cue-line {
      border-radius: var(--radius);
      color: #eef5ff;
      line-height: 1.7;
    }

    .lyric-line {
      padding: 8px 4px 9px;
      font-size: 18px;
      font-weight: 650;
      color: #eef5ff;
      letter-spacing: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-bottom: 1px solid rgba(198, 222, 255, .16);
    }

    .cue-line {
      display: inline-flex;
      width: auto;
      padding: 5px 10px;
      color: var(--cyan-2);
      background: rgba(40, 242, 238, .1);
      border: 1px solid rgba(40, 242, 238, .22);
      font-size: 14px;
      font-weight: 850;
    }

    .bar {
      position: relative;
      min-height: 58px;
      display: flex;
      align-items: center;
      align-content: center;
      flex-wrap: wrap;
      gap: 7px 12px;
      overflow: visible;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: var(--radius);
      padding: 11px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.97), rgba(230,238,255,.95));
      color: var(--ink);
    }

    .bar-number {
      position: absolute;
      top: 5px;
      right: 7px;
      color: rgba(13, 36, 102, .46);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .bar.repeat {
      border-color: rgba(40, 242, 238, .55);
      box-shadow: inset 0 0 0 1px rgba(40, 242, 238, .15);
    }

    .chord {
      display: inline-flex;
      min-width: max-content;
      color: var(--card-chord-color);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      white-space: nowrap;
    }

    .chord-chip {
      display: inline-grid;
      gap: 2px;
      min-width: max-content;
      padding-top: 8px;
    }

    .beat-mark {
      color: rgba(13, 36, 102, .52);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .rhythm-mark {
      color: var(--rhythm-color);
      font-size: 17px;
      font-weight: 950;
      line-height: 1.18;
    }

    .plain {
      margin: 0;
      min-height: 540px;
      padding: 22px;
      color: var(--paper);
      background: rgba(2, 7, 20, .72);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 15px;
      line-height: 1.85;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .lead-sheet {
      margin: 0;
      min-height: 540px;
      padding: 22px;
      color: #08143a;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(235,242,255,.96));
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 16px;
      font-weight: 720;
      line-height: 1.9;
      white-space: pre;
      overflow-x: auto;
      tab-size: 4;
    }

    .sheet-line {
      min-height: 1.9em;
    }

    .sheet-section {
      display: inline-block;
      margin-top: 10px;
      color: var(--section-color);
      font-weight: 950;
    }

    .sheet-cue {
      color: #1477b8;
      font-weight: 850;
    }

    .sheet-lyric {
      color: var(--lyric-color);
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
      font-weight: 650;
      white-space: pre-wrap;
    }

    .sheet-chord {
      color: var(--chord-color);
      font-weight: 950;
      text-shadow: 0 0 16px rgba(40, 242, 238, .18);
    }

    .sheet-barline {
      color: rgba(8, 20, 58, .42);
      font-weight: 800;
    }

    .sheet-rhythm {
      color: var(--rhythm-color);
      font-weight: 950;
    }

    .status {
      min-height: 20px;
      margin-bottom: 10px;
      color: var(--cyan);
      font-weight: 800;
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      main {
        padding: 18px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .section {
        grid-template-columns: 1fr;
      }

      .section-name {
        border-right: 0;
        border-bottom: 1px solid rgba(198, 222, 255, .16);
      }

      .bars {
        gap: 8px;
        padding: 10px;
      }

      .bar-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .bar {
        min-height: 52px;
        padding: 9px 10px;
      }

      .chord {
        font-size: 16px;
      }

      .lyric-line {
        padding: 7px 2px 8px;
        font-size: 17px;
      }

      .lead-sheet {
        padding: 16px;
        font-size: 14px;
        line-height: 1.8;
      }
    }

    @media print {
      body {
        background: white;
        color: #111;
      }

      body::before,
      aside,
      .toolbar,
      .status {
        display: none;
      }

      .app {
        display: block;
      }

      main {
        padding: 0;
      }

      .sheet {
        border: 0;
        box-shadow: none;
      }

      .section-name,
      .bars {
        background: white;
        color: #111;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <img src="icon.png" alt="Song Chord Book">
        <div>
          <h1>Song Chord Book</h1>
          <div class="tagline">どの曲も、好きなキーへ。</div>
        </div>
      </div>

      <div class="transpose-card">
        <div class="key-flow">
          <div class="key-box"><div><span>原曲キー</span><strong id="originalKeyRead">E</strong></div></div>
          <div class="arrow">→</div>
          <div class="key-box"><div><span>現在</span><strong id="nowKey">E</strong></div></div>
        </div>
        <div class="control">
          <label for="targetKey">移調先キー</label>
          <select id="targetKey"></select>
        </div>
        <div class="control">
          <label for="originalKeyInput">原曲キー</label>
          <select id="originalKeyInput"></select>
        </div>
        <div class="stepper">
          <button id="downBtn" title="半音下げる">-1</button>
          <button id="resetBtn" class="primary" title="原曲キーに戻す">リセット</button>
          <button id="upBtn" title="半音上げる">+1</button>
        </div>
      </div>

      <div class="control">
        <label>表示</label>
        <div class="view-switch">
          <button id="sheetBtn" class="active">譜面</button>
          <button id="chartBtn">カード</button>
          <button id="textBtn">テキスト</button>
        </div>
      </div>

      <div class="control">
        <label for="bpmInput">BPM</label>
        <input id="bpmInput" type="number" min="20" max="260" value="122">
      </div>

      <div class="control">
        <label for="meterInput">拍子</label>
        <select id="meterInput">
          <option value="4">4/4</option>
          <option value="3">3/4</option>
          <option value="6">6/8</option>
          <option value="5">5/4</option>
        </select>
      </div>

      <div class="song-stats">
        <div class="song-stat"><div><span>小節数</span><strong id="measureCount">0</strong></div></div>
        <div class="song-stat"><div><span>拍数</span><strong id="beatCount">0</strong></div></div>
      </div>

      <div class="control">
        <label for="titleInput">曲名</label>
        <input id="titleInput" type="text" value="Blue Lagoon">
      </div>

      <div class="control color-settings">
        <label>色設定</label>
        <div class="color-grid">
          <div class="color-field">
            <span>コード</span>
            <input id="chordColorInput" type="color" value="#007c89">
          </div>
          <div class="color-field">
            <span>歌詞</span>
            <input id="lyricColorInput" type="color" value="#243a68">
          </div>
          <div class="color-field">
            <span>見出し</span>
            <input id="sectionColorInput" type="color" value="#052a70">
          </div>
          <div class="color-field">
            <span>記号</span>
            <input id="rhythmColorInput" type="color" value="#d8662a">
          </div>
        </div>
        <div class="source-actions">
          <button id="resetColorsBtn" type="button">色を戻す</button>
        </div>
      </div>

      <div class="control builder">
        <label>入力補助</label>
        <div class="builder-grid">
          <div class="builder-row">
            <input id="sectionBuilderInput" type="text" placeholder="Intro / A / サビ">
            <button id="addSectionBtn" type="button">見出し</button>
          </div>
          <div class="builder-row">
            <input id="barBuilderInput" type="text" placeholder="Edim7 E Edim7 E">
            <button id="addBarBtn" type="button">小節</button>
          </div>
          <div class="builder-row">
            <input id="lyricBuilderInput" type="text" placeholder="歌詞を入力">
            <button id="addLyricBtn" type="button">歌詞</button>
          </div>
        </div>
        <div class="builder-actions">
          <button id="toggleChordPickerBtn" type="button">コード</button>
          <button id="addBlankBtn" type="button">改行</button>
          <button id="addRepeatBtn" type="button">繰返し</button>
          <button id="addStarterBtn" type="button">ひな形</button>
        </div>
        <div class="grid-mode">
          <select id="gridResolutionInput">
            <option value="16">16分グリッド</option>
            <option value="8">8分グリッド</option>
            <option value="4">4分グリッド</option>
          </select>
          <button id="fillGridDotsBtn" type="button">空で埋める</button>
        </div>
        <div class="grid16" id="grid16Inputs">
          <input class="grid-cell" type="text" placeholder="1">
          <input class="grid-cell" type="text" placeholder="e">
          <input class="grid-cell" type="text" placeholder="+">
          <input class="grid-cell" type="text" placeholder="a">
          <input class="grid-cell" type="text" placeholder="2">
          <input class="grid-cell" type="text" placeholder="e">
          <input class="grid-cell" type="text" placeholder="+">
          <input class="grid-cell" type="text" placeholder="a">
          <input class="grid-cell" type="text" placeholder="3">
          <input class="grid-cell" type="text" placeholder="e">
          <input class="grid-cell" type="text" placeholder="+">
          <input class="grid-cell" type="text" placeholder="a">
          <input class="grid-cell" type="text" placeholder="4">
          <input class="grid-cell" type="text" placeholder="e">

            <select id="rootPicker"></select>
            <select id="qualityPicker"></select>
            <select id="bassPicker"></select>
          </div>
          <div class="picker-preview">
            <span id="chordPreview">C</span>
            <button id="insertPickedChordBtn" type="button">入力</button>
          </div>
          <div id="commonChordButtons" class="picker-buttons"></div>
          <div class="rhythm-buttons">
            <button class="rhythmBtn" data-symbol=">">アクセント</button>
            <button class="rhythmBtn" data-symbol="^">食う</button>
            <button class="rhythmBtn" data-symbol="-">伸ばし</button>
            <button class="rhythmBtn" data-symbol="~">タイ</button>
          </div>
        </div>

      <div class="control">
        <label for="sourceInput">コード譜入力</label>
        <textarea id="sourceInput" spellcheck="false"></textarea>
        <div class="source-actions">
          <button id="undoSourceBtn" type="button">アンドゥ</button>
          <button id="clearSourceBtn" type="button">クリア</button>
          <button id="sampleSourceBtn" type="button">サンプル</button>
          <button id="autoGridBtn" type="button">自動グリッド</button>

    <main>
      <div class="toolbar">
        <div class="title-block">
          <h2 id="songTitle">Blue Lagoon</h2>
          <p id="metaLine">Key E / BPM 122</p>
        </div>
        <div class="actions">
          <button id="copyBtn">コピー</button>
          <button id="printBtn">印刷</button>
        </div>
      </div>
      <div class="status" id="status"></div>
      <div class="sheet">
        <pre id="sheetView" class="lead-sheet"></pre>
        <div id="chartView" class="hidden"></div>
        <pre id="textView" class="plain hidden"></pre>
      </div>
    </main>
  </div>

  <script>
    const storageKey = "song-chord-book-state-v1";
    let originalKey = "E";
    const sharpKeys = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const flatKeys = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
    const noteIndex = {
      C: 0, "B#": 0, "C#": 1, Db: 1, D: 2, "D#": 3, Eb: 3, E: 4, Fb: 4,
      "E#": 5, F: 5, "F#": 6, Gb: 6, G: 7, "G#": 8, Ab: 8, A: 9, "A#": 10, Bb: 10, B: 11, Cb: 11
    };
    const flatPreferred = new Set(["F", "Bb", "Eb", "Ab", "Db", "Gb", "Cb"]);

    const defaultChart = `Intro:
| Edim7 | E | Edim7 | E |
| Edim7 | E | Edim7 | E |
| Esus4 | E |

A:
| EM7(9) | G#m7 | C#m7 C#mM7 | C#m7 C#m6 |
| AM7    | G#7  | C#m7       | F#m7(11) F#m7/B |

B:
| EM7(9) | F#m7 C#7 F#m7 F#m7/B |
| EM7(9) | F#m7 C#7 F#m7 F#m7/B |
| EM7(9) | F#m7 C#7 F#m7 F#m7/B |
| EM7(9) | F#m7 C#7 F#m7 F#m7/B |

C:
| EM7 | F#m7 | EM7/G# | F#m7 |
| EM7 | F#m7 | EM7/G# | F#m7/A |
| F#m7(9)/B | F#m7(9)/B | F#m7(9)/B | F#m7(9)/B |

Inter:
| Edim7 | E | Edim7 | E |
| Edim7 | E | Edim7 | E |
| Esus4 | E |

D Guitar Solo:
A x 3

Organ Solo:
B

C:
| EM7 | F#m7 | EM7/G# | F#m7 |
| EM7 | F#m7 | EM7/G# | F#m7/A |

Perc Solo:
| F#m7(9)/B | F#m7(9)/B | F#m7(9)/B | F#m7(9)/B |

A
B

Ending:
||: EM7(9) | F#m7 C#7 F#m7 F#m7/B |
    EM7(9) | F#m7 C#7 F#m7 F#m7/B :|| fade out`;

    const els = {
      targetKey: document.querySelector("#targetKey"),
      originalKeyInput: document.querySelector("#originalKeyInput"),
      originalKeyRead: document.querySelector("#originalKeyRead"),
      nowKey: document.querySelector("#nowKey"),
      songTitle: document.querySelector("#songTitle"),
      titleInput: document.querySelector("#titleInput"),
      metaLine: document.querySelector("#metaLine"),
      bpmInput: document.querySelector("#bpmInput"),
      meterInput: document.querySelector("#meterInput"),
      measureCount: document.querySelector("#measureCount"),
      beatCount: document.querySelector("#beatCount"),
      chordColorInput: document.querySelector("#chordColorInput"),
      lyricColorInput: document.querySelector("#lyricColorInput"),
      sectionColorInput: document.querySelector("#sectionColorInput"),
      rhythmColorInput: document.querySelector("#rhythmColorInput"),
      sectionBuilderInput: document.querySelector("#sectionBuilderInput"),
      barBuilderInput: document.querySelector("#barBuilderInput"),
      lyricBuilderInput: document.querySelector("#lyricBuilderInput"),
      chordPicker: document.querySelector("#chordPicker"),
      rootPicker: document.querySelector("#rootPicker"),
      qualityPicker: document.querySelector("#qualityPicker"),
      bassPicker: document.querySelector("#bassPicker"),
      chordPreview: document.querySelector("#chordPreview"),
      commonChordButtons: document.querySelector("#commonChordButtons"),
      gridResolutionInput: document.querySelector("#gridResolutionInput"),
      grid16Inputs: Array.from(document.querySelectorAll("#grid16Inputs input")),
      sourceInput: document.querySelector("#sourceInput"),
      sheetView: document.querySelector("#sheetView"),
      chartView: document.querySelector("#chartView"),
      textView: document.querySelector("#textView"),
      sheetBtn: document.querySelector("#sheetBtn"),
      chartBtn: document.querySelector("#chartBtn"),
      textBtn: document.querySelector("#textBtn"),
      status: document.querySelector("#status")
    };

    let currentShift = 0;
    let sourceChart = defaultChart;
    const undoStack = [];
    let activeGridInput = null;

    function saveState() {
      const state = {
        title: els.titleInput.value,
        originalKey,
        targetKey: els.targetKey.value,
        bpm: els.bpmInput.value,
        meter: els.meterInput.value,
        colors: currentColors(),
        chart: els.sourceInput.value
      };
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "null");
      } catch {
      return null;
      }
    }

    function currentColors() {
      return {
        chord: els.chordColorInput.value,
        lyric: els.lyricColorInput.value,
        section: els.sectionColorInput.value,
        rhythm: els.rhythmColorInput.value
      };
    }

    function applyColors(colors = currentColors()) {
      const nextColors = {
        chord: "#007c89",
        lyric: "#243a68",
        section: "#052a70",
        rhythm: "#d8662a",
        ...colors
      };
      const root = document.documentElement;
      root.style.setProperty("--chord-color", nextColors.chord);
      root.style.setProperty("--card-chord-color", nextColors.chord);
      root.style.setProperty("--lyric-color", nextColors.lyric);
      root.style.setProperty("--section-color", nextColors.section);
      root.style.setProperty("--rhythm-color", nextColors.rhythm);
      els.chordColorInput.value = nextColors.chord;
      els.lyricColorInput.value = nextColors.lyric;
      els.sectionColorInput.value = nextColors.section;
      els.rhythmColorInput.value = nextColors.rhythm;
    }

    function resetColors() {
      applyColors({
        chord: "#007c89",
        lyric: "#243a68",
        section: "#052a70",
        rhythm: "#d8662a"
      });
      update();
    }

    function mod(value, by) {
      return ((value % by) + by) % by;
    }

    function keyName(index, preferFlats) {
      return (preferFlats ? flatKeys : sharpKeys)[mod(index, 12)];
    }

    function keyRoot(key) {
      return key.endsWith("m") ? key.slice(0, -1) : key;
    }

    function keyMode(key) {
      return key.endsWith("m") ? "m" : "";
    }

    function keyIndex(key) {
      return noteIndex[keyRoot(key)];
    }

    function prefersFlatsForTarget(targetKey) {
      return flatPreferred.has(keyRoot(targetKey));
    }

    function transposeRoot(root, shift, preferFlats) {
      const index = noteIndex[root];
      if (index === undefined) return root;
      return keyName(index + shift, preferFlats);
    }

    function transposeChordToken(token, shift, preferFlats) {
      return token.replace(/^([A-G](?:#|b)?)([^/\s|:]*)(?:\/([A-G](?:#|b)?))?$/, (_match, root, quality, bass) => {
        const nextRoot = transposeRoot(root, shift, preferFlats);
        const nextBass = bass ? "/" + transposeRoot(bass, shift, preferFlats) : "";
        return nextRoot + quality + nextBass;
      });
    }

    function transposeText(text, shift, preferFlats) {
      return text.replace(/[A-G](?:#|b)?[^|\s:]*?(?:\/[A-G](?:#|b)?)?(?=\s|\||:|$)/g, token => {
        if (!/[A-G]/.test(token) || /^(Intro|Inter|Ending|Organ|Guitar|Solo|Perc|fade|out)$/i.test(token)) {
          return token;
        }
        return transposeChordToken(token, shift, preferFlats);
      });
    }

    function parseSections(text) {
      const sections = [];
      let current = { name: "Chart", lines: [] };

      text.split(/\r?\n/).forEach(raw => {
        const line = raw.trimEnd();
        const header = line.match(/^([^|]+):$/);
        if (header) {
          if (current.lines.length) sections.push(current);
          current = { name: header[1].trim(), lines: [] };
        } else if (line.trim() || current.lines.length) {
          current.lines.push(line);
        }
      });

      if (current.lines.length) sections.push(current);
      return sections;
    }

    function formatBeat(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function currentBeatsPerMeasure() {
      return Number.parseInt(els.meterInput.value, 10) || 4;
    }

    function isChordToken(token) {
      return /^([A-G](?:#|b)?)([^/\s|:]*)?(?:\/([A-G](?:#|b)?))?$/.test(token);
    }

    function isRhythmToken(token) {
      return [">", "^", "-", "~"].includes(token);
    }

    function isGridToken(token) {
      return token === ".";
    }

    function isBarToken(token) {
      return isChordToken(token) || isRhythmToken(token) || isGridToken(token);
    }

    function isChordOnlyLine(line) {
      const tokens = line
        .replace(/:\|\||\|\|:|:|\|\||[,，]/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean);
      return tokens.length > 0 && tokens.every(isBarToken);
    }

    function barTokensFromLine(line) {
      return line
        .replace(/:\|\||\|\|:|:|\|\||[,，]/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean);
    }

    function isCueLine(line) {
      const trimmed = line.trim();
      const first = trimmed[0];
      const last = trimmed[trimmed.length - 1];
      const bracketed = (first === "[" && last === "]") || (first === "(" && last === ")");
      return bracketed || /^(Intro|Inter|Verse|A|B|C|D|Bridge|Chorus|Ending|Solo|Hook|Pre|Outro)\b/i.test(trimmed);
    }

    function renderPlainLine(line, bars) {
      const row = document.createElement("div");
      row.className = "lyric-row";
      const text = document.createElement("div");
      text.className = isCueLine(line) ? "cue-line" : "lyric-line";
      text.textContent = line.trim();
      row.appendChild(text);
      bars.appendChild(row);
    }

    function renderBarFromChords(part, row, beatsPerMeasure, measureNumber) {
      const bar = document.createElement("div");
      bar.className = part.includes(":") ? "bar repeat" : "bar";
      const number = document.createElement("span");
      number.className = "bar-number";
      number.textContent = measureNumber;
      bar.appendChild(number);

      const tokens = part.replace(/:\|\||\|\|:|:|\|\|/g, "").split(/\s+/).filter(Boolean);
      const isGridBar = [4, 8, 16].includes(tokens.length) && tokens.some(isGridToken);
      const beatTokens = tokens.filter(token => isChordToken(token));
      const beatStep = isGridBar ? beatsPerMeasure / tokens.length : (beatTokens.length ? beatsPerMeasure / beatTokens.length : beatsPerMeasure);
      let chordIndex = 0;
      tokens.forEach((token, tokenIndex) => {
        const chip = document.createElement("span");
        chip.className = "chord-chip";
        const beat = document.createElement("span");
        beat.className = "beat-mark";
        const isChord = isChordToken(token);
        beat.textContent = isChord ? formatBeat(1 + (isGridBar ? tokenIndex : chordIndex) * beatStep) : "";
        const span = document.createElement("span");
        span.className = isGridToken(token) ? "grid-dot" : (isChord ? "chord" : "rhythm-mark");
        span.textContent = token;
        chip.append(beat, span);
        bar.appendChild(chip);
        if (isChord) chordIndex += 1;
      });
      row.appendChild(bar);
    }

    function appendSheetToken(lineEl, token) {
      const span = document.createElement("span");
      if (/^\|+$|^:\|\|$|^\|\|:$|^:?\|\|:?$/.test(token)) {
        span.className = "sheet-barline";
      } else if (isRhythmToken(token)) {
        span.className = "sheet-rhythm";
      } else if (isGridToken(token)) {
        span.className = "sheet-grid-dot";
      } else if (isChordToken(token.replace(/:$/, ""))) {
        span.className = "sheet-chord";
      } else {
        span.className = "sheet-lyric";
      }
      span.textContent = token;
      lineEl.appendChild(span);
    }

    function renderSheet(text) {
      els.sheetView.innerHTML = "";
      text.split(/\r?\n/).forEach(line => {
        const lineEl = document.createElement("div");
        lineEl.className = "sheet-line";

        if (!line.trim()) {
          lineEl.textContent = " ";
          els.sheetView.appendChild(lineEl);
          return;
        }

        if (/^[^|]+:\s*$/.test(line.trim())) {
          const span = document.createElement("span");
          span.className = "sheet-section";
          span.textContent = line.trim();
          lineEl.appendChild(span);
          els.sheetView.appendChild(lineEl);
          return;
        }

        if (isCueLine(line)) {
          const span = document.createElement("span");
          span.className = "sheet-cue";
          span.textContent = line;
          lineEl.appendChild(span);
          els.sheetView.appendChild(lineEl);
          return;
        }

        if (line.includes("|") || isChordOnlyLine(line)) {
          line.split(/(\s+|\|\|:|:\|\||\||:)/).filter(part => part !== "").forEach(part => {
            if (/^\s+$/.test(part)) {
              lineEl.appendChild(document.createTextNode(part));
            } else {
              appendSheetToken(lineEl, part);
            }
          });
        } else {
          const span = document.createElement("span");
          span.className = "sheet-lyric";
          span.textContent = line;
          lineEl.appendChild(span);
        }

        els.sheetView.appendChild(lineEl);
      });
    }

    function renderChart(text) {
      els.chartView.innerHTML = "";
      let measureCounter = 0;
      const beatsPerMeasure = currentBeatsPerMeasure();
      parseSections(text).forEach(section => {
        const wrap = document.createElement("section");
        wrap.className = "section";

        const name = document.createElement("div");
        name.className = "section-name";
        name.textContent = section.name;

        const bars = document.createElement("div");
        bars.className = "bars";

        section.lines.forEach(line => {
          if (!line.trim()) return;
          if (!line.includes("|")) {
            if (isChordOnlyLine(line)) {
              const row = document.createElement("div");
              row.className = "bar-row";
              measureCounter += 1;
              renderBarFromChords(line.trim(), row, beatsPerMeasure, measureCounter);
              bars.appendChild(row);
              return;
            }

            renderPlainLine(line, bars);
            return;
          }

          const parts = line.split("|").map(part => part.trim()).filter(Boolean);
          if (!parts.some(isChordOnlyLine)) {
            renderPlainLine(line, bars);
            return;
          }

          const row = document.createElement("div");
          row.className = "bar-row";
          parts.forEach(part => {
            if (!isChordOnlyLine(part)) {
              renderPlainLine(part, bars);
              return;
            }
            measureCounter += 1;
            renderBarFromChords(part, row, beatsPerMeasure, measureCounter);
          });
          if (row.children.length) {
            bars.appendChild(row);
          }
        });

        wrap.append(name, bars);
        els.chartView.appendChild(wrap);
      });
      els.measureCount.textContent = measureCounter;
      els.beatCount.textContent = measureCounter * beatsPerMeasure;
    }

    function update() {
      const targetIndex = mod(keyIndex(originalKey) + currentShift, 12);
      const targetKey = keyName(targetIndex, prefersFlatsForTarget(els.targetKey.value)) + keyMode(els.targetKey.value || originalKey);
      const preferFlats = prefersFlatsForTarget(targetKey);
      const output = transposeText(sourceChart, currentShift, preferFlats);

      els.targetKey.value = targetKey;
      els.originalKeyInput.value = originalKey;
      els.originalKeyRead.textContent = originalKey;
      els.nowKey.textContent = targetKey;
      els.songTitle.textContent = els.titleInput.value || "無題";
      els.metaLine.textContent = `キー ${targetKey} / BPM ${els.bpmInput.value || "122"} / ${els.meterInput.selectedOptions[0].textContent}`;
      renderSheet(output);
      els.textView.textContent = output;
      renderChart(output);
      saveState();
    }

    function setTargetKey(key) {
      currentShift = mod(keyIndex(key) - keyIndex(originalKey), 12);
      update();
    }

    function applySourceEdit() {
      sourceChart = els.sourceInput.value;
      update();
    }

    function rememberSource(value = els.sourceInput.value) {
      const current = value;
      if (undoStack[undoStack.length - 1] !== current) {
        undoStack.push(current);
      }
      if (undoStack.length > 80) undoStack.shift();
    }

    function undoSourceEdit() {
      if (!undoStack.length) {
        els.status.textContent = "戻せる編集がありません";
        setTimeout(() => els.status.textContent = "", 1800);
        return;
      }
      els.sourceInput.value = undoStack.pop();
      applySourceEdit();
      els.status.textContent = "ひとつ戻しました";
      setTimeout(() => els.status.textContent = "", 1800);
    }

    function replaceSourceValue(value) {
      rememberSource();
      els.sourceInput.value = value;
      applySourceEdit();
    }

    function insertIntoSource(text, options = {}) {
      rememberSource();
      const input = els.sourceInput;
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      const needsSpaceBefore = options.inline && before && !/[\s|]$/.test(before);
      const needsSpaceAfter = options.inline && after && !/^[\s|]/.test(after);
      const insertion = `${needsSpaceBefore ? " " : ""}${text}${needsSpaceAfter ? " " : ""}`;
      input.value = before + insertion + after;
      const cursor = before.length + insertion.length;
      input.focus();
      input.setSelectionRange(cursor, cursor);
      applySourceEdit();
    }

    function normalizeBarInput(value) {
      const trimmed = value.trim();
      if (!trimmed) return "| C | F | G | C |";
      if (trimmed.includes("|")) {
        return trimmed;
      }
      return `| ${trimmed} |`;
    }

    function insertIntoBarInput(text) {
      if (activeGridInput) {
        activeGridInput.value = text;
        const index = els.grid16Inputs.indexOf(activeGridInput);
        const next = els.grid16Inputs.slice(index + 1, currentGridSize()).find(input => !input.classList.contains("hidden"));
        if (next) {
          next.focus();
          activeGridInput = next;
        }
        return;
      }
      const input = els.barBuilderInput;
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      const spacerBefore = before && !/\s$/.test(before) ? " " : "";
      const spacerAfter = after && !/^\s/.test(after) ? " " : "";
      input.value = before + spacerBefore + text + spacerAfter + after;
      const cursor = (before + spacerBefore + text + spacerAfter).length;
      input.focus();
      input.setSelectionRange(cursor, cursor);
    }

    function currentPickedChord() {
      const root = els.rootPicker.value;
      const quality = els.qualityPicker.value;
      const bass = els.bassPicker.value;
      return `${root}${quality}${bass ? "/" + bass : ""}`;
    }

    function updateChordPreview() {
      els.chordPreview.textContent = currentPickedChord();
    }

    function fillPicker(select, values, labelForEmpty = "") {
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value || labelForEmpty;
        select.appendChild(option);
      });
    }

    function setupChordPicker() {
      const roots = ["C", "C#", "Db", "D", "D#", "Eb", "E", "F", "F#", "Gb", "G", "G#", "Ab", "A", "A#", "Bb", "B"];
      const qualities = ["", "m", "7", "m7", "M7", "M7(9)", "mM7", "6", "m6", "dim7", "sus4", "add9", "7sus4", "m7(11)", "m7(9)"];
      fillPicker(els.rootPicker, roots);
      fillPicker(els.qualityPicker, qualities, "メジャー");
      fillPicker(els.bassPicker, ["", ...roots], "ベースなし");

      ["C", "Dm7", "Em7", "F", "G", "Am", "Bm7b5", "C7", "CM7", "Csus4", "Cadd9", "C/G"].forEach(chord => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = chord;
        button.addEventListener("click", () => insertIntoBarInput(chord));
        els.commonChordButtons.appendChild(button);
      });

      [els.rootPicker, els.qualityPicker, els.bassPicker].forEach(select => {
        select.addEventListener("change", updateChordPreview);
      });
      updateChordPreview();
    }

    function gridBarText() {
      const tokens = els.grid16Inputs.slice(0, currentGridSize()).map(input => input.value.trim() || ".");
      return `| ${tokens.join(" ")} |`;
    }

    function currentGridSize() {
      return Number.parseInt(els.gridResolutionInput.value, 10) || 16;
    }

    function tokensToGridBar(tokens, gridSize = currentGridSize()) {
      const grid = Array(gridSize).fill(".");
      const count = Math.min(tokens.length, gridSize);
      tokens.slice(0, count).forEach((token, index) => {
        const slot = Math.min(gridSize - 1, Math.floor(index * gridSize / count));
        grid[slot] = token;
      });
      return `| ${grid.join(" ")} |`;
    }

    function autoGridText(text) {
      return text.split(/\r?\n/).map(line => {
        if (!line.trim() || line.includes("|") || !isChordOnlyLine(line)) {
          return line;
        }
        const tokens = barTokensFromLine(line);
        const gridSize = currentGridSize();
        if (tokens.length <= gridSize) {
          return tokensToGridBar(tokens);
        }
        const bars = [];
        for (let i = 0; i < tokens.length; i += gridSize) {
          bars.push(tokensToGridBar(tokens.slice(i, i + gridSize), gridSize));
        }
        return bars.join("\n");
      }).join("\n");
    }

    function clearGrid() {
      els.grid16Inputs.forEach(input => {
        input.value = "";
      });
      activeGridInput = els.grid16Inputs[0] || null;
      if (activeGridInput) activeGridInput.focus();
    }

    function fillGridDots() {
      els.grid16Inputs.slice(0, currentGridSize()).forEach(input => {
        input.value = ".";
      });
    }

    function updateGridResolution() {
      const labels = {
        4: ["1", "2", "3", "4"],
        8: ["1", "+", "2", "+", "3", "+", "4", "+"],
        16: ["1", "e", "+", "a", "2", "e", "+", "a", "3", "e", "+", "a", "4", "e", "+", "a"]
      };
      const size = currentGridSize();
      els.grid16Inputs.forEach((input, index) => {
        input.classList.toggle("hidden", index >= size);
        input.placeholder = labels[size][index] || "";
        if (index >= size) input.value = "";
      });
      if (activeGridInput && els.grid16Inputs.indexOf(activeGridInput) >= size) {
        activeGridInput = els.grid16Inputs[0] || null;
      }
    }

    function fillKeySelect(select) {
      [...sharpKeys, "Bb", "Eb", "Ab", "Db", "Gb"].flatMap(key => [key, `${key}m`]).forEach(key => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = key;
        select.appendChild(option);
      });
    }

    fillKeySelect(els.targetKey);
    fillKeySelect(els.originalKeyInput);
    setupChordPicker();
    updateGridResolution();
    els.grid16Inputs.forEach(input => {
      input.addEventListener("focus", () => {
        activeGridInput = input;
      });
    });
    els.barBuilderInput.addEventListener("focus", () => {
      activeGridInput = null;
    });

    els.sourceInput.value = defaultChart;
    els.targetKey.value = originalKey;
    els.originalKeyInput.value = originalKey;

    const saved = loadState();
    if (saved) {
      originalKey = keyIndex(saved.originalKey) !== undefined ? saved.originalKey : originalKey;
      els.titleInput.value = saved.title || "Blue Lagoon";
      els.bpmInput.value = saved.bpm || "122";
      els.meterInput.value = saved.meter || "4";
      if (saved.colors) {
        applyColors(saved.colors);
      } else {
        applyColors();
      }
      sourceChart = saved.chart || defaultChart;
      els.sourceInput.value = sourceChart;
      currentShift = saved.targetKey && keyIndex(saved.targetKey) !== undefined
        ? mod(keyIndex(saved.targetKey) - keyIndex(originalKey), 12)
        : 0;
    } else {
      applyColors();
    }

    document.querySelector("#downBtn").addEventListener("click", () => {
      currentShift -= 1;
      update();
    });
    document.querySelector("#upBtn").addEventListener("click", () => {
      currentShift += 1;
      update();
    });
    document.querySelector("#resetBtn").addEventListener("click", () => {
      currentShift = 0;
      els.targetKey.value = originalKey;
      update();
    });
    els.targetKey.addEventListener("change", event => setTargetKey(event.target.value));
    els.originalKeyInput.addEventListener("change", event => {
      const currentTarget = els.targetKey.value;
      originalKey = event.target.value;
      currentShift = mod(keyIndex(currentTarget) - keyIndex(originalKey), 12);
      update();
    });
    els.titleInput.addEventListener("input", update);
    els.bpmInput.addEventListener("input", update);
    els.meterInput.addEventListener("change", update);
    [els.chordColorInput, els.lyricColorInput, els.sectionColorInput, els.rhythmColorInput].forEach(input => {
      input.addEventListener("input", () => {
        applyColors();
        update();
      });
    });
    document.querySelector("#resetColorsBtn").addEventListener("click", resetColors);
    document.querySelector("#applyBtn").addEventListener("click", () => {
      rememberSource(sourceChart);
      applySourceEdit();
    });
    document.querySelector("#addSectionBtn").addEventListener("click", () => {
      const name = els.sectionBuilderInput.value.trim() || "セクション";
      insertIntoSource(`${name}:`, { inline: true });
      els.sectionBuilderInput.value = "";
    });
    document.querySelector("#addBarBtn").addEventListener("click", () => {
      insertIntoSource(normalizeBarInput(els.barBuilderInput.value), { inline: true });
      els.barBuilderInput.value = "";
    });
    document.querySelector("#addLyricBtn").addEventListener("click", () => {
      const lyric = els.lyricBuilderInput.value.trim() || "ここに歌詞";
      insertIntoSource(lyric, { inline: true });
      els.lyricBuilderInput.value = "";
    });
    document.querySelector("#addBlankBtn").addEventListener("click", () => {
      insertIntoSource("\n");
    });
    document.querySelector("#addRepeatBtn").addEventListener("click", () => {
      insertIntoSource("||: C | F | G | C :||", { inline: true });
    });
    document.querySelector("#addGridBarBtn").addEventListener("click", () => {
      insertIntoSource(gridBarText(), { inline: true });
    });
    document.querySelector("#clearGridBtn").addEventListener("click", clearGrid);
    document.querySelector("#fillGridDotsBtn").addEventListener("click", fillGridDots);
    els.gridResolutionInput.addEventListener("change", updateGridResolution);
    document.querySelector("#addStarterBtn").addEventListener("click", () => {
      insertIntoSource("Intro:\n| C | F | G | C |\n\nA:\n| C | G/B | Am | F |\nここに歌詞\n| C | G | F | C |\n\n");
    });
    document.querySelector("#toggleChordPickerBtn").addEventListener("click", () => {
      els.chordPicker.classList.toggle("open");
    });
    document.querySelector("#insertPickedChordBtn").addEventListener("click", () => {
      insertIntoBarInput(currentPickedChord());
    });
    document.querySelectorAll(".rhythmBtn").forEach(button => {
      button.addEventListener("click", () => insertIntoBarInput(button.dataset.symbol));
    });
    document.querySelector("#clearSourceBtn").addEventListener("click", () => {
      if (!confirm("コード譜本文をクリアしますか？")) return;
      replaceSourceValue("");
      els.status.textContent = "クリアしました";
      setTimeout(() => els.status.textContent = "", 1800);
    });
    document.querySelector("#sampleSourceBtn").addEventListener("click", () => {
      replaceSourceValue(defaultChart);
      els.status.textContent = "サンプルに戻しました";
      setTimeout(() => els.status.textContent = "", 1800);
    });
    document.querySelector("#autoGridBtn").addEventListener("click", () => {
      replaceSourceValue(autoGridText(els.sourceInput.value));
      els.status.textContent = `コード行を${currentGridSize()}分割グリッドへ配置しました`;
      setTimeout(() => els.status.textContent = "", 2200);
    });
    document.querySelector("#pasteSourceBtn").addEventListener("click", async () => {
      try {
        insertIntoSource(await navigator.clipboard.readText(), { inline: false });
        els.status.textContent = "貼り付けました";
      } catch {
        els.status.textContent = "ブラウザに貼り付けをブロックされました";
      }
      setTimeout(() => els.status.textContent = "", 1800);
    });
    document.querySelector("#undoSourceBtn").addEventListener("click", undoSourceEdit);
    document.querySelector("#copySourceBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(els.sourceInput.value);
      els.status.textContent = "入力欄をコピーしました";
      setTimeout(() => els.status.textContent = "", 1800);
    });
    function setView(view) {
      els.sheetBtn.classList.toggle("active", view === "sheet");
      els.chartBtn.classList.toggle("active", view === "chart");
      els.textBtn.classList.toggle("active", view === "text");
      els.sheetView.classList.toggle("hidden", view !== "sheet");
      els.chartView.classList.toggle("hidden", view !== "chart");
      els.textView.classList.toggle("hidden", view !== "text");
    }

    els.sheetBtn.addEventListener("click", () => setView("sheet"));
    els.chartBtn.addEventListener("click", () => setView("chart"));
    els.textBtn.addEventListener("click", () => setView("text"));
    document.querySelector("#copyBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(els.textView.textContent);
      els.status.textContent = "コピーしました";
      setTimeout(() => els.status.textContent = "", 1800);
    });
    document.querySelector("#printBtn").addEventListener("click", () => window.print());

    update();
  </script>
</body>
</html>
