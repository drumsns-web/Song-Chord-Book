    function autoScrollStep(timestamp) {
      if (!autoScrollRunning) return;
      if (!autoScrollLastTime) autoScrollLastTime = timestamp;
      const deltaSeconds = Math.min(.08, (timestamp - autoScrollLastTime) / 1000);
      autoScrollLastTime = timestamp;
      const speed = Number.parseFloat(els.scrollSpeedInput.value) || 36;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      if (window.scrollY >= maxScroll - 2) {
        stopAutoScroll();
        return;
      }
      window.scrollBy({ top: speed * deltaSeconds, left: 0, behavior: "auto" });
      autoScrollFrame = requestAnimationFrame(autoScrollStep);
    }

    function startAutoScroll() {
      if (autoScrollRunning) return;
      autoScrollRunning = true;
      autoScrollLastTime = 0;
      document.body.classList.add("auto-scroll-active");
      els.autoScrollBtn.classList.add("active");
      els.autoScrollBtn.textContent = "停止";
      autoScrollFrame = requestAnimationFrame(autoScrollStep);
    }

    function stopAutoScroll() {
      autoScrollRunning = false;
      autoScrollLastTime = 0;
      document.body.classList.remove("auto-scroll-active");
      els.autoScrollBtn.classList.remove("active");
      els.autoScrollBtn.textContent = "スクロール";
      if (autoScrollFrame) cancelAnimationFrame(autoScrollFrame);
      autoScrollFrame = null;
    }

    function toggleAutoScroll() {
      if (autoScrollRunning) {
        stopAutoScroll();
      } else {
        startAutoScroll();
      }
    }

    function setEditMode(enabled) {
      editMode = enabled;
      document.body.classList.toggle("edit-mode", editMode);
      els.editModeBtn.classList.toggle("active", editMode);
      els.editModeBtn.textContent = editMode ? "編集中" : "編集";
      if (editMode) {
        stopAutoScroll();
      } else {
        selectedGridEdit = null;
        markSelectedGridEdit();
      }
    }

    function shouldIgnoreSheetTap(target) {
      return Boolean(target.closest("button, input, select, textarea, label, .scroll-control"));
    }

    els.sheetBtn.addEventListener("click", () => setView("sheet"));
    els.gridBtn.addEventListener("click", () => setView("grid"));
    els.chartBtn.addEventListener("click", () => setView("chart"));
    els.textBtn.addEventListener("click", () => setView("text"));
    els.editModeBtn.addEventListener("click", event => {
      event.stopPropagation();
      setEditMode(!editMode);
    });
    els.autoScrollBtn.addEventListener("click", event => {
      event.stopPropagation();
      toggleAutoScroll();
    });
    els.scrollSpeedInput.addEventListener("click", event => event.stopPropagation());
    els.scrollSpeedInput.addEventListener("pointerdown", event => event.stopPropagation());
    const sheetPanel = document.querySelector(".sheet");
    sheetPanel.addEventListener("pointerdown", event => {
      if (editMode || shouldIgnoreSheetTap(event.target)) return;
      sheetTapStart = {
        pointerId: event.pointerId,
        x: event.clientX,
        y: event.clientY,
        time: performance.now()
      };
    });
    sheetPanel.addEventListener("pointerup", event => {
      if (editMode || shouldIgnoreSheetTap(event.target) || !sheetTapStart) return;
      if (sheetTapStart.pointerId !== event.pointerId) {
        sheetTapStart = null;
        return;
      }
      const distance = Math.hypot(event.clientX - sheetTapStart.x, event.clientY - sheetTapStart.y);
      const elapsed = performance.now() - sheetTapStart.time;
      sheetTapStart = null;
      if (distance > 12 || elapsed > 650) return;
      toggleAutoScroll();
    });
    sheetPanel.addEventListener("pointercancel", () => {
      sheetTapStart = null;
    });
    window.addEventListener("wheel", () => {
      if (autoScrollRunning) stopAutoScroll();
    }, { passive: true });
    window.addEventListener("touchmove", () => {
      if (autoScrollRunning) stopAutoScroll();
    }, { passive: true });
    document.querySelector("#copyBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(els.textView.textContent);
      els.status.textContent = "コピーしました";
      setTimeout(() => els.status.textContent = "", 1800);
    });
    document.querySelector("#printBtn").addEventListener("click", () => window.print());

    update();
  </script>
</body>
</html>
