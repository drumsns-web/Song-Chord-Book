<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Song Chord Book</title>
  <link rel="icon" href="icon.png" type="image/png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020714;
      --navy: #07143a;
      --navy-2: #0d2466;
      --panel: rgba(8, 22, 58, .78);
      --panel-2: rgba(255, 255, 255, .08);
      --line: rgba(198, 222, 255, .18);
      --text: #f7fbff;
      --muted: #9eb6d8;
      --cyan: #28f2ee;
      --cyan-2: #72ffff;
      --paper: #fbfdff;
      --ink: #10204b;
      --chord-color: #007c89;
      --card-chord-color: #0d2466;
      --lyric-color: #243a68;
      --section-color: #052a70;
      --rhythm-color: #d8662a;
      --beat-dot-color: #d8662a;
      --beat-dot-scale: 1.45;
      --beat-grid-chord-color: #45fff4;
      --beat-grid-rhythm-color: #ffb347;
      --beat-grid-lyric-color: #e8f2ff;
      --beat-grid-dot-color: #6d778a;
      --shadow: 0 28px 80px rgba(0, 0, 0, .36);
      --radius: 8px;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 22% 0%, rgba(50, 84, 255, .48), transparent 34%),
        radial-gradient(circle at 82% 22%, rgba(40, 242, 238, .16), transparent 28%),
        linear-gradient(135deg, #020714 0%, #07143a 42%, #020714 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.75), transparent 82%);
    }

    button,
    select,
    textarea,
    input {
      font: inherit;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255, 255, 255, .08);
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(40, 242, 238, .58);
      background: rgba(40, 242, 238, .12);
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(310px, 390px) minmax(0, 1fr);
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(3, 10, 31, .92), rgba(6, 18, 50, .84));
      backdrop-filter: blur(18px);
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .brand {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand img {
      width: 74px;
      height: 74px;
      border-radius: 19px;
      box-shadow: 0 18px 34px rgba(0, 0, 0, .36), 0 0 28px rgba(40, 242, 238, .2);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin: 16px 0;
    }

    label {
      color: #bfd1f0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      outline: none;
    }

    select,
    input {
      min-height: 42px;
      padding: 8px 10px;
    }

    select option {
      color: #07143a;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
      padding: 12px;
      line-height: 1.55;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
    }

    .editing-line-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 36px;
      margin-top: 8px;
      padding: 7px 9px;
      border: 1px solid rgba(40, 242, 238, .24);
      border-radius: var(--radius);
      background: rgba(40, 242, 238, .08);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .editing-line-panel strong {
      color: var(--cyan-2);
      white-space: nowrap;
    }

    .editing-line-panel span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .transpose-card {
      border: 1px solid rgba(40, 242, 238, .24);
      border-radius: var(--radius);
      padding: 16px;
      background:
        linear-gradient(145deg, rgba(40, 242, 238, .14), rgba(255,255,255,.04)),
        rgba(255,255,255,.04);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .2);
    }

    .key-flow {
      display: grid;
      grid-template-columns: 1fr 54px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .song-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .song-stat {
      min-height: 64px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .07);
      text-align: center;
    }

    .song-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .song-stat strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      line-height: 1;
    }

    .key-box {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .08);
    }

    .key-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
    }

    .key-box strong {
      display: block;
      margin-top: 4px;
      font-size: 34px;
      line-height: 1;
    }

    .arrow {
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--cyan);
      color: #06214a;
      font-size: 32px;
      font-weight: 900;
      box-shadow: 0 0 26px rgba(40, 242, 238, .55);
    }

    .stepper,
    .view-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .view-switch {
      grid-template-columns: repeat(4, 1fr);
    }

    .key-detect {
      display: grid;
      gap: 8px;
      margin: 8px 0 14px;
    }

    .key-detect-result {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .source-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .builder {
      border: 1px solid rgba(40, 242, 238, .2);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255, 255, 255, .05);
    }

    .builder-grid {
      display: grid;
      gap: 8px;
    }

    .builder-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .builder-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .builder-actions button,
    .builder-row button {
      padding-inline: 10px;
      white-space: nowrap;
    }

    .color-settings {
      border: 1px solid rgba(198, 222, 255, .18);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255, 255, 255, .045);
    }

    .color-settings .source-actions {
      grid-template-columns: 1fr;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .color-field {
      display: grid;
      grid-template-columns: 1fr 42px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .color-field.wide {
      grid-template-columns: 1fr;
      grid-column: 1 / -1;
    }

    input[type="color"] {
      min-height: 34px;
      padding: 3px;
      cursor: pointer;
    }

    .picker-panel {
      display: none;
      gap: 10px;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(198, 222, 255, .18);
      border-radius: var(--radius);
      background: rgba(2, 7, 20, .36);
    }

    .picker-panel.open {
      display: grid;
    }

    .picker-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .picker-buttons,
    .rhythm-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .rhythm-buttons {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .picker-buttons button,
    .rhythm-buttons button {
      min-height: 34px;
      padding: 5px 6px;
      font-size: 12px;
      font-weight: 800;
    }

    .rhythm-buttons button {
      display: grid;
      gap: 2px;
      min-height: 46px;
      line-height: 1.15;
    }

    .rhythm-buttons button small {
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
    }

    .picker-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--cyan);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-weight: 900;
    }

    .grid16 {
      display: grid;
      grid-template-columns: 42px repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
      align-items: stretch;
    }

    .grid-guide {
      min-height: 24px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-align: center;
    }

    .grid-beat-label {
      min-height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(40, 242, 238, .28);
      border-radius: var(--radius);
      color: var(--cyan-2);
      background: rgba(40, 242, 238, .1);
      font-size: 12px;
      font-weight: 950;
      line-height: 1.15;
      text-align: center;
    }

    .grid-mode {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .beat-resolution {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 8px;
    }

    .beat-resolution label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
    }

    .grid-symbol-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .grid-symbol-row button {
      min-height: 46px;
      padding: 6px 5px;
      display: grid;
      place-items: center;
      gap: 2px;
      border-color: rgba(40, 242, 238, .28);
      background: rgba(40, 242, 238, .08);
      color: var(--text);
      line-height: 1.15;
    }

    .grid-symbol-row button strong {
      color: var(--cyan);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 15px;
      font-weight: 950;
    }

    .grid-symbol-row button span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
    }

    .grid-cell {
      min-height: 36px;
      padding: 6px;
      text-align: center;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
    }

    .grid-cell.beat-head {
      border-color: rgba(40, 242, 238, .38);
      background: rgba(40, 242, 238, .09);
    }

    .grid16 .grid-cell.hidden {
      display: block;
      visibility: hidden;
      pointer-events: none;
    }

    .grid-edit-mode {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 179, 71, .26);
      border-radius: var(--radius);
      color: #ffe4b8;
      background: rgba(255, 179, 71, .08);
      font-size: 12px;
      font-weight: 850;
      line-height: 1.35;
    }

    .grid-chord-popup {
      position: fixed;
      z-index: 30;
      display: none;
      width: min(340px, calc(100vw - 24px));
      max-height: min(430px, calc(100vh - 28px));
      overflow: auto;
      padding: 10px;
      border: 1px solid rgba(40, 242, 238, .34);
      border-radius: var(--radius);
      background: rgba(4, 10, 30, .97);
      box-shadow: 0 22px 70px rgba(0, 0, 0, .48), 0 0 0 1px rgba(255, 255, 255, .08) inset;
    }

    .grid-chord-popup.open {
      display: grid;
      gap: 8px;
    }

    .grid-chord-popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--cyan-2);
      font-size: 12px;
      font-weight: 900;
    }

    .grid-chord-popup-close {
      width: 30px;
      min-height: 30px;
      border-radius: 50%;
      padding: 0;
      line-height: 1;
    }

    .grid-chord-popup-section {
      display: grid;
      gap: 5px;
    }

    .grid-chord-popup-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }

    .grid-chord-popup-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
    }

    .grid-chord-popup-buttons button {
      min-height: 32px;
      padding: 4px 5px;
      font-size: 12px;
      font-weight: 900;
      font-family: "Cascadia Mono", Consolas, monospace;
    }

    .grid-chord-popup-buttons button.muted-choice {
      color: var(--muted);
      font-family: inherit;
    }

    .grid-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .grid-dot,
    .sheet-grid-dot {
      color: rgba(13, 36, 102, .28);
      font-weight: 900;
    }

    .grid-dot.beat-grid-dot,
    .sheet-grid-dot.beat-grid-dot {
      color: var(--beat-dot-color);
      display: inline-block;
      font-size: calc(1em * var(--beat-dot-scale));
      line-height: 1;
      transform: none;
    }

    .sheet-grid-dot .stacked-token {
      color: inherit;
    }

    .sheet-grid-dot .token-rhythm {
      color: inherit;
    }

    button.primary,
    button.active {
      border-color: transparent;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-2));
      color: #041733;
      font-weight: 850;
      box-shadow: 0 0 22px rgba(40, 242, 238, .32);
    }

    .toolbar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .title-block {
      min-width: 0;
    }

    .title-block h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 64px);
      line-height: .98;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 10px 0 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .scroll-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .scroll-control input {
      width: 86px;
      min-height: 0;
      padding: 0;
      accent-color: var(--cyan);
    }

    .auto-scroll-active .sheet {
      box-shadow: var(--shadow), 0 0 0 3px rgba(40, 242, 238, .32);
    }

    .sheet {
      overflow: hidden;
      border: 1px solid rgba(198, 222, 255, .22);
      border-radius: 12px;
      background: rgba(255,255,255,.07);
      box-shadow: var(--shadow);
    }

    .section {
      display: grid;
      grid-template-columns: 138px minmax(0, 1fr);
      border-top: 1px solid rgba(198, 222, 255, .16);
    }

    .section:first-child {
      border-top: 0;
    }

    .section-name {
      padding: 18px 16px;
      color: #dce9ff;
      font-weight: 900;
      background: rgba(255, 255, 255, .06);
      border-right: 1px solid rgba(198, 222, 255, .16);
    }

    .bars {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: rgba(255, 255, 255, .035);
    }

    .bar-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(178px, 1fr));
      gap: 10px;
    }

    .lyric-row {
      display: block;
      margin: 2px 0 4px;
    }

    .lyric-line,
    .cue-line {
      border-radius: var(--radius);
      color: #eef5ff;
      line-height: 1.7;
    }

    .lyric-line {
      padding: 8px 4px 9px;
      font-size: 18px;
      font-weight: 650;
      color: #eef5ff;
      letter-spacing: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-bottom: 1px solid rgba(198, 222, 255, .16);
    }

    .active-edit-line {
      position: relative;
      outline: 2px solid rgba(40, 242, 238, .72);
      outline-offset: 3px;
      background: rgba(40, 242, 238, .12);
      box-shadow: 0 0 0 5px rgba(40, 242, 238, .08);
    }

    .sheet-line,
    .sheet-measure,
    .bar,
    .beat-grid-measure,
    .beat-grid-lyric,
    .beat-slot {
      cursor: default;
    }

    body.edit-mode .sheet-line,
    body.edit-mode .sheet-measure,
    body.edit-mode .bar,
    body.edit-mode .beat-grid-measure,
    body.edit-mode .beat-grid-lyric,
    body.edit-mode .beat-slot {
      cursor: text;
    }

    .selected-edit-target {
      outline: 3px solid rgba(255, 179, 71, .9);
      outline-offset: 3px;
      box-shadow: 0 0 0 5px rgba(255, 179, 71, .14);
    }

    .sheet-line.active-edit-line {
      border-radius: var(--radius);
      padding-inline: 6px;
    }

    .sheet-measure {
      display: inline-block;
      border-radius: 5px;
      padding: 0 3px;
      transition: background .14s ease, box-shadow .14s ease;
    }

    body.edit-mode .sheet-measure:hover {
      background: rgba(40, 242, 238, .1);
      box-shadow: inset 0 -2px 0 rgba(40, 242, 238, .28);
    }

    .bar.active-edit-line,
    .lyric-line.active-edit-line,
    .cue-line.active-edit-line {
      outline-offset: 2px;
    }

    .cue-line {
      display: inline-flex;
      width: auto;
      padding: 5px 10px;
      color: var(--cyan-2);
      background: rgba(40, 242, 238, .1);
      border: 1px solid rgba(40, 242, 238, .22);
      font-size: 14px;
      font-weight: 850;
    }

    .bar {
      position: relative;
      min-height: 58px;
      display: flex;
      align-items: center;
      align-content: center;
      flex-wrap: wrap;
      gap: 7px 12px;
      overflow: visible;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: var(--radius);
      padding: 11px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.97), rgba(230,238,255,.95));
      color: var(--ink);
    }

    .bar-number {
      position: absolute;
      top: 5px;
      right: 7px;
      color: rgba(13, 36, 102, .46);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .bar.repeat {
      border-color: rgba(40, 242, 238, .55);
      box-shadow: inset 0 0 0 1px rgba(40, 242, 238, .15);
    }

    .chord {
      display: inline-flex;
      min-width: max-content;
      color: var(--card-chord-color);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      white-space: nowrap;
    }

    .chord-chip {
      display: inline-grid;
      gap: 2px;
      min-width: max-content;
      padding-top: 8px;
    }

    .beat-mark {
      color: rgba(13, 36, 102, .52);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .rhythm-mark {
      color: var(--rhythm-color);
      font-size: 17px;
      font-weight: 950;
      line-height: 1.18;
    }

    .stacked-token {
      display: inline-grid;
      place-items: center;
      grid-template-rows: .86em 1.1em;
      gap: 0;
      line-height: 1;
      vertical-align: middle;
      min-height: 1.96em;
    }

    .stacked-token .token-rhythm {
      grid-row: 1;
      color: var(--rhythm-color);
      font-size: .72em;
      font-weight: 950;
      line-height: 1;
      min-height: .86em;
    }

    .stacked-token .token-rhythm.empty {
      visibility: hidden;
    }

    .stacked-token .token-chord {
      grid-row: 2;
      color: inherit;
      font-weight: inherit;
      line-height: 1.05;
    }

    .stacked-token .token-chord.empty {
      visibility: hidden;
    }

    .stacked-token.rhythm-only .token-rhythm {
      grid-row: 2;
      transform: none;
    }

    .stacked-token.barline-token {
      grid-template-rows: 1fr;
      min-height: 1.96em;
    }

    .stacked-token.barline-token .token-barline {
      grid-row: 1;
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      color: inherit;
      line-height: 1;
    }

    .plain {
      margin: 0;
      min-height: 540px;
      padding: 22px;
      color: var(--paper);
      background: rgba(2, 7, 20, .72);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 15px;
      line-height: 1.85;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .lead-sheet {
      margin: 0;
      min-height: 540px;
      padding: 22px;
      color: #08143a;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(235,242,255,.96));

      font-weight: 720;
      line-height: 1.9;
      white-space: pre;
      overflow-x: auto;
      tab-size: 4;

    .sheet-line {
      min-height: 2.35em;
      margin-bottom: .18em;
    }

    .sheet-section {
      display: inline-block;
      margin-top: 10px;
      color: var(--section-color);
      font-weight: 950;
    }

    .sheet-cue {
      color: #1477b8;
      font-weight: 850;
    }

    .sheet-lyric {
      color: var(--lyric-color);
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
      font-weight: 650;
      white-space: pre-wrap;
    }

    .sheet-chord {
      color: var(--chord-color);
      font-weight: 950;
      text-shadow: 0 0 16px rgba(40, 242, 238, .18);
    }

    .sheet-barline {
      color: rgba(8, 20, 58, .42);
      font-weight: 800;
    }

    .sheet-barline .barline-spacer {
      color: inherit;
    }

    .sheet-rhythm {
      color: var(--rhythm-color);
      font-weight: 950;
    }

    .beat-grid-view {
      min-height: 540px;
      padding: 18px;
      background: #05070d;
      overflow-x: auto;
    }

    .beat-grid-section {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .beat-grid-section-title {
      color: #f5f7ff;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .04em;
    }

    .beat-grid-row {
      display: flex;
      gap: 18px;
      align-items: stretch;
      min-width: max-content;
    }

    .beat-grid-measure {
      position: relative;
      width: 360px;
      min-height: 72px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 10px;
      background: #252525;
    }

    .beat-grid-measure-number {
      position: absolute;
      top: 5px;
      right: 8px;
      z-index: 2;
      color: rgba(255, 255, 255, .45);
      font-size: 11px;
      font-weight: 900;
    }

    .beat-cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 82px;
      border-left: 2px solid #05070d;
      color: #f8fbff;
      font-size: 24px;
      font-weight: 950;
    }

    .beat-cell:first-child {
      border-left: 0;
    }

    .beat-cell-label {
      position: absolute;
      top: 5px;
      left: 7px;
      color: rgba(255, 255, 255, .34);
      font-size: 10px;
      font-weight: 900;
    }

    .beat-cell-content {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 48px;
      padding: 18px 5px 6px;
      text-align: center;
    }

    .beat-subgrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: 100%;
      height: 100%;
    }

    .beat-slot {
      display: grid;
      place-items: center;
      min-width: 20px;
      border-left: 1px solid rgba(255, 255, 255, .14);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.1;
      outline: 0;
      user-select: text;
    }

    .beat-slot:first-child {
      border-left: 0;
    }

    .beat-cell-content > .beat-slot {
      min-width: 42px;
      border-left: 0;
      padding: 2px 6px;
    }

    .beat-slot.selected-edit-target {
      border-radius: 4px;
      background: rgba(255, 179, 71, .18);
      box-shadow: inset 0 0 0 2px rgba(255, 179, 71, .78), 0 0 16px rgba(255, 179, 71, .18);
    }

    .beat-grid-chord {
      color: var(--beat-grid-chord-color);
      text-shadow: 0 0 12px color-mix(in srgb, var(--beat-grid-chord-color) 48%, transparent);
    }

    .beat-grid-rhythm {
      color: var(--beat-grid-rhythm-color);
      text-shadow: 0 0 10px color-mix(in srgb, var(--beat-grid-rhythm-color) 34%, transparent);

    .beat-slot .stacked-token .token-rhythm {
      color: var(--beat-grid-rhythm-color);
      font-size: .76em;
      text-shadow: 0 0 10px color-mix(in srgb, var(--beat-grid-rhythm-color) 34%, transparent);
    }

    .beat-slot .stacked-token .token-chord {
      color: var(--beat-grid-chord-color);
      text-shadow: 0 0 12px color-mix(in srgb, var(--beat-grid-chord-color) 48%, transparent);
    }

    .beat-slot.beat-grid-dot .stacked-token .token-rhythm {
      color: var(--beat-grid-dot-color);
      opacity: .8;
      text-shadow: none;
    }

      font-weight: 650;

      font-size: 13px;

    .hidden {

    @media (max-width: 900px) {

      aside {

      .section {
        grid-template-columns: 1fr;
      }

      .section-name {
        border-right: 0;

      .bars {
        gap: 8px;

      .bar-row {

      .bar {

      .chord {

      .lyric-line {

      }

      .lead-sheet {
        width: 100%;
        max-width: 100%;
        padding: 16px;
        font-size: 14px;
        line-height: 1.8;
        white-space: normal;
        overflow-x: hidden;
        overflow-wrap: anywhere;
      }

      .sheet-line {
        white-space: normal;
      }

      .sheet-measure {
        display: inline;
        padding: 0;
      }

      .sheet-chord,
      .sheet-grid-dot,
      .sheet-rhythm,
      .sheet-barline {
        display: inline-block;
      }

      .scroll-control {
        flex: 1 1 180px;
      }

      .scroll-control input {
        width: 100%;
      }
    }

    @media (min-width: 1100px) {
      .app {
        grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);

      main {
        padding: 34px 42px;

      .toolbar {
        align-items: center;

      .beat-grid-view {

        overflow-x: visible;
      }

      .beat-grid-section {
        gap: 16px;
      }

      .beat-grid-row {
        flex-wrap: wrap;
        gap: 18px;

      }

      .beat-grid-measure {
        flex: 1 1 380px;
        width: auto;
        max-width: 520px;
        min-height: 82px;
      }

      .beat-cell {
        min-width: 0;
        font-size: 25px;
      }

      .beat-slot {
        min-width: 0;
        font-size: 15px;
      }

      .beat-grid-lyric {
        max-width: 980px;
      }
    }

    @media (min-width: 1500px) {
      .app {
        grid-template-columns: 460px minmax(0, 1fr);
      }

      .beat-grid-measure {
        flex-basis: 440px;
        max-width: 620px;
      }
    }

    @media print {
      body {
        background: white;
        color: #111;
      }

      body::before,
      aside,
      .toolbar,
      .status {
        display: none;
      }

      .app {
        display: block;
      }

      main {
        padding: 0;
      }

      .sheet {
        border: 0;
        box-shadow: none;
      }

      .section-name,
      .bars {
        background: white;
        color: #111;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>

  <script>
    const storageKey = "song-chord-book-state-v1";
    let originalKey = "E";
    const sharpKeys = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const flatKeys = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
    const noteIndex = {
      C: 0, "B#": 0, "C#": 1, Db: 1, D: 2, "D#": 3, Eb: 3, E: 4, Fb: 4,
      "E#": 5, F: 5, "F#": 6, Gb: 6, G: 7, "G#": 8, Ab: 8, A: 9, "A#": 10, Bb: 10, B: 11, Cb: 11
    };
    const flatPreferred = new Set(["F", "Bb", "Eb", "Ab", "Db", "Gb", "Cb"]);
    const keyDisplayNames = ["C", "C#", "D", "Eb", "E", "F", "F#", "G", "Ab", "A", "Bb", "B"];

    const defaultChart = `Intro:
| Edim7 | E | Edim7 | E |
| Edim7 | E | Edim7 | E |
| Esus4 | E |

A:
| EM7(9) | G#m7 | C#m7 C#mM7 | C#m7 C#m6 |

    function mod(value, by) {
      return ((value % by) + by) % by;
    }

    function keyName(index, preferFlats) {
      return (preferFlats ? flatKeys : sharpKeys)[mod(index, 12)];
    }

    function keyRoot(key) {
      return key.endsWith("m") ? key.slice(0, -1) : key;
    }

    function keyMode(key) {
      return key.endsWith("m") ? "m" : "";
    }

    function keyIndex(key) {
      return noteIndex[keyRoot(key)];
    }

    function prefersFlatsForTarget(targetKey) {
      return flatPreferred.has(keyRoot(targetKey));
    }

    function transposeRoot(root, shift, preferFlats) {
      const index = noteIndex[root];
      if (index === undefined) return root;
      return keyName(index + shift, preferFlats);
    }

    function rhythmPrefix(token) {
      const normalized = normalizeRhythmSymbols(token);
      const match = normalized.match(/^([>^~⌒\-]+)(.+)$/);
      return match && isChordToken(match[2]) ? match[1] : "";
    }

    function normalizeRhythmSymbols(symbol) {
      return String(symbol || "")
        .replace(/[~^]/g, "⌒")
        .replace(/[‐‑‒–—−]/g, "-");
    }

    function rhythmDisplayText(symbol) {
      return normalizeRhythmSymbols(symbol);
    }

    function chordPartFromToken(token) {
      const prefix = rhythmPrefix(token);
      return prefix ? token.slice(prefix.length) : token;
    }

    function isChordLikeToken(token) {
      return isChordToken(token) || Boolean(rhythmPrefix(token));
    }

    function splitMusicalToken(token) {
      const prefix = rhythmPrefix(token);
      return {
        rhythm: prefix,
        chord: prefix ? token.slice(prefix.length) : (isChordToken(token) ? token : "")
      };
    }

    function transposeChordToken(token, shift, preferFlats) {
      const prefix = rhythmPrefix(token);
      const chordToken = prefix ? token.slice(prefix.length) : token;
      const transposed = chordToken.replace(/^([A-G](?:#|b)?)([^/\s|:]*)(?:\/([A-G](?:#|b)?))?$/, (_match, root, quality, bass) => {
        const nextRoot = transposeRoot(root, shift, preferFlats);
        const nextBass = bass ? "/" + transposeRoot(bass, shift, preferFlats) : "";
        return nextRoot + quality + nextBass;
      });
      return prefix + transposed;
    }

    function transposeText(text, shift, preferFlats) {
      return text.replace(/[A-G](?:#|b)?[^|\s:]*?(?:\/[A-G](?:#|b)?)?(?=\s|\||:|$)/g, token => {
        if (!/[A-G]/.test(token) || /^(Intro|Inter|Ending|Organ|Guitar|Solo|Perc|fade|out)$/i.test(token)) {
          return token;
        }
        return transposeChordToken(token, shift, preferFlats);
      });
    }

    function parseSections(text) {
      const sections = [];
      let current = { name: "Chart", lines: [] };

      text.split(/\r?\n/).forEach((raw, lineNumber) => {
        const line = raw.trimEnd();
        const header = line.match(/^([^|]+):$/);
        if (header) {
          if (current.lines.length) sections.push(current);
          current = { name: header[1].trim(), lines: [] };
        } else if (line.trim() || current.lines.length) {
          current.lines.push({ text: line, lineNumber });
        }
      });

      if (current.lines.length) sections.push(current);
      return sections;
    }

    function formatBeat(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function currentBeatsPerMeasure() {

    function isChordToken(token) {
      return /^([A-G](?:#|b)?)([^/\s|:]*)?(?:\/([A-G](?:#|b)?))?$/.test(token);
    }

    function isRhythmToken(token) {
      return /^[>^~⌒\-‐‑‒–—−]+$/.test(String(token || ""));
    }

    function isGridToken(token) {
      return token === ".";
    }

    function isBarToken(token) {
      return isChordLikeToken(token) || isRhythmToken(token) || isGridToken(token);
    }

    function normalizeStackedTokens(tokens) {
      const normalized = [];
      let rhythmBuffer = "";
      tokens.forEach(token => {
        if (isRhythmToken(token)) {
          rhythmBuffer += token;
          return;
        }
        if (rhythmBuffer && isChordLikeToken(token)) {
          normalized.push(rhythmBuffer + token);
          rhythmBuffer = "";
          return;
        }
        if (rhythmBuffer) {
          normalized.push(rhythmBuffer);
          rhythmBuffer = "";
        }
        normalized.push(token);
      });
      if (rhythmBuffer) normalized.push(rhythmBuffer);
      return normalized;
    }

    function isBeatGridIndex(tokenIndex, gridSize) {
      return [4, 8, 16].includes(gridSize) && tokenIndex % (gridSize / 4) === 0;
    }

    function isChordOnlyLine(line) {
      const tokens = normalizeStackedTokens(line
        .replace(/:\|\||\|\|:|:|\|\||[,，]/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean));
      return tokens.length > 0 && tokens.every(isBarToken);
    }

    function barTokensFromLine(line) {
      return normalizeStackedTokens(line
        .replace(/:\|\||\|\|:|:|\|\||[,，]/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean));
    }

    function cleanBarPart(part) {
      return part.replace(/:\|\||\|\|:|:|\|\|/g, "").trim();
    }

    function tokenForSource(token) {
      const trimmed = token.trim() || ".";
      if (!isChordLikeToken(trimmed)) return trimmed;
      return transposeChordToken(trimmed, -currentShift, prefersFlatsForTarget(originalKey));
    }

    function tokenForDisplay(token) {
      if (!isChordLikeToken(token)) return token;
      const targetIndex = mod(keyIndex(originalKey) + currentShift, 12);
      const targetKey = keyName(targetIndex, prefersFlatsForTarget(els.targetKey.value)) + keyMode(els.targetKey.value || originalKey);
      return transposeChordToken(token, currentShift, prefersFlatsForTarget(targetKey));
    }

    function replaceChordPartInLine(line, partIndex, nextPart) {
      if (!line.includes("|")) {
        return partIndex === 0 ? nextPart.trim() : line;
      }

      const segments = line.split("|");
      let chordPartIndex = 0;
      for (let index = 0; index < segments.length; index += 1) {
        const segment = segments[index];
        if (!segment.trim() || !isChordOnlyLine(segment)) continue;
        if (chordPartIndex === partIndex) {
          const leadingSpace = segment.match(/^\s*/)?.[0] || " ";
          const trailingSpace = segment.match(/\s*$/)?.[0] || " ";
          const trimmed = segment.trim();
          const prefix = trimmed.startsWith(":") ? ": " : "";
          const suffix = trimmed.endsWith(":") ? " :" : "";
          segments[index] = `${leadingSpace || " "}${prefix}${nextPart.trim()}${suffix}${trailingSpace || " "}`;
          return segments.join("|");
        }
        chordPartIndex += 1;
      }
      return line;
    }

    function sourcePartTokens(line, partIndex) {
      if (!line.includes("|")) return barTokensFromLine(line);
      const parts = line.split("|").map(part => part.trim()).filter(Boolean);
      const chordParts = parts.filter(isChordOnlyLine);
      return barTokensFromLine(chordParts[partIndex] || "");
    }

    function isCueLine(line) {
      const trimmed = line.trim();
      const first = trimmed[0];
      const last = trimmed[trimmed.length - 1];
      const bracketed = (first === "[" && last === "]") || (first === "(" && last === ")");
      return bracketed || /^(Intro|Inter|Verse|A|B|C|D|Bridge|Chorus|Ending|Solo|Hook|Pre|Outro)\b/i.test(trimmed);

    function parseChordForKey(token) {
      const cleaned = token
        .replace(/^[|:([{]+/, "")
        .replace(/[|:,\])}]+$/g, "")
        .trim();
      const chordToken = chordPartFromToken(cleaned);
      const match = chordToken.match(/^([A-G](?:#|b)?)([^/\s|:]*)(?:\/([A-G](?:#|b)?))?$/);
      if (!match) return null;
      const quality = match[2] || "";
      if (quality && !/^(mM|mMaj|m7b5|m|M|maj|Maj|dim|aug|sus|add|[0-9]|ø|\+)/.test(quality)) {
        return null;
      }
      const rootIndex = noteIndex[match[1]];
      if (rootIndex === undefined) return null;
      return {
        token: chordToken,
        root: match[1],
        rootIndex,
        quality,
        flavor: chordFlavor(quality)
      };
    }

    function chordFlavor(quality = "") {
      if (/dim|m7b5|ø/i.test(quality)) return "dim";
      if (/aug|\+/i.test(quality)) return "aug";
      if (/^m(?!aj|Maj|M)/.test(quality)) return "minor";
      return "major";
    }

    function extractChordsForKey(text) {
      const chords = [];
      text.split(/\r?\n/).forEach(line => {
        const trimmed = line.trim();
        if (!trimmed || /^[^|]+:\s*$/.test(trimmed) || /^[A-D](?:\s*[x×]\s*\d+)?$/i.test(trimmed)) {
          return;
        }
        trimmed
          .replace(/:\|\||\|\|:|\|/g, " ")
          .split(/\s+/)
          .map(parseChordForKey)
          .filter(Boolean)
          .forEach(chord => chords.push(chord));
      });
      return chords;
    }

    function scaleScore(mode, relativeRoot, flavor) {
      const majorMap = {
        0: { major: 5 },
        2: { minor: 3.5 },
        4: { minor: 3 },
        5: { major: 3.5 },
        7: { major: 4 },
        9: { minor: 3.5 },
        11: { dim: 2.5 }
      };
      const minorMap = {
        0: { minor: 5 },
        2: { dim: 2.5 },
        3: { major: 3.5 },
        5: { minor: 3 },
        7: { minor: 2.5, major: 4 },
        8: { major: 3.5 },
        10: { major: 2.75 }
      };
      const match = (mode === "minor" ? minorMap : majorMap)[relativeRoot];
      if (!match) return 0;
      return (match[flavor] || 1.2) + 1;
    }

    function candidateKeyLabel(index, mode) {
      return keyDisplayNames[mod(index, 12)] + (mode === "minor" ? "m" : "");
    }

    function detectKeyFromText(text) {
      const chords = extractChordsForKey(text);
      if (chords.length < 3) return null;

      const candidates = [];
      for (let tonic = 0; tonic < 12; tonic += 1) {
        ["major", "minor"].forEach(mode => {
          let score = 0;
          chords.forEach((chord, index) => {
            const relativeRoot = mod(chord.rootIndex - tonic, 12);
            const weight = index === 0 ? 1.35 : index === chords.length - 1 ? 1.2 : 1;
            score += scaleScore(mode, relativeRoot, chord.flavor) * weight;
            if (relativeRoot === 0) score += mode === chord.flavor ? 2.4 : 1.1;
            if (relativeRoot === 7) score += 0.8;
          });

          const first = chords[0];
          const last = chords[chords.length - 1];
          if (first.rootIndex === tonic) score += first.flavor === mode || (mode === "major" && first.flavor === "major") ? 7 : 3;
          if (last.rootIndex === tonic) score += last.flavor === mode || (mode === "major" && last.flavor === "major") ? 5 : 2;

          candidates.push({
            key: candidateKeyLabel(tonic, mode),
            mode,
            score,
            chords: chords.length
          });
        });
      }

      candidates.sort((a, b) => b.score - a.score);
      return {
        best: candidates[0],
        candidates: candidates.slice(0, 3),
        chords
      };
    }

    function applyDetectedKey() {
      const result = detectKeyFromText(els.sourceInput.value);
      if (!result) {
        els.keyDetectResult.textContent = "コードが少ないため推定できませんでした";
        els.status.textContent = "コードを3つ以上含む譜面で試してください";
        setTimeout(() => els.status.textContent = "", 2200);
        return;
      }

      const detectedKey = result.best.key;
      originalKey = detectedKey;
      currentShift = 0;
      els.originalKeyInput.value = detectedKey;
      els.targetKey.value = detectedKey;
      update();

      const candidateText = result.candidates
        .map(candidate => `${candidate.key}`)
        .join(" / ");
      els.keyDetectResult.textContent = `推定キー: ${detectedKey}（候補: ${candidateText}）`;
      els.status.textContent = `${result.chords.length}個のコードから ${detectedKey} と推定しました`;
      setTimeout(() => els.status.textContent = "", 2600);
    }

    function renderPlainLine(line, bars, sourceLine = -1) {
      const row = document.createElement("div");

    }

    function appendMusicalTokenContent(element, token) {
      if (isGridToken(token) || isRhythmToken(token)) {
        const wrap = document.createElement("span");
        const isUpperSymbol = isRhythmToken(token) && /[>⌒^~]/.test(token) && !/^-+$/.test(rhythmDisplayText(token));
        wrap.className = `stacked-token ${isUpperSymbol ? "symbol-only" : "rhythm-only"}`;
        const chord = document.createElement("span");
        chord.className = "token-chord empty";
        chord.textContent = "";
        const rhythm = document.createElement("span");
        rhythm.className = "token-rhythm";
        rhythm.textContent = isGridToken(token) ? "・" : rhythmDisplayText(token);
        wrap.append(rhythm, chord);
        element.appendChild(wrap);
        return;
      }

      const parts = splitMusicalToken(token);
      if (!parts.chord) {
        element.textContent = token;
        return;
      }
      const wrap = document.createElement("span");
      wrap.className = `stacked-token${parts.rhythm ? " rhythm-over" : ""}`;
      const rhythm = document.createElement("span");
      rhythm.className = `token-rhythm${parts.rhythm ? "" : " empty"}`;
      rhythm.textContent = parts.rhythm ? rhythmDisplayText(parts.rhythm) : "·";
      const chord = document.createElement("span");
      chord.className = "token-chord";
      chord.textContent = parts.chord;
      wrap.append(rhythm, chord);
      element.appendChild(wrap);
    }

    function appendAlignedBarline(element, token) {
      const wrap = document.createElement("span");
      wrap.className = "stacked-token barline-token";
      const barline = document.createElement("span");
      barline.className = "token-barline";
      barline.textContent = token;
      wrap.appendChild(barline);
      element.appendChild(wrap);
    }

    function appendAlignedPlainToken(element, token) {
      const wrap = document.createElement("span");
      wrap.className = "stacked-token rhythm-only";
      const spacer = document.createElement("span");
      spacer.className = "token-chord empty";
      spacer.textContent = "";
      const body = document.createElement("span");
      body.className = "token-rhythm";
      body.textContent = isGridToken(token) ? "・" : rhythmDisplayText(token);
      wrap.append(body, spacer);
      element.appendChild(wrap);
    }

    function renderBarFromChords(part, row, beatsPerMeasure, measureNumber, sourceLine = -1, partIndex = 0) {
      const bar = document.createElement("div");
      bar.className = part.includes(":") ? "bar repeat" : "bar";
      if (sourceLine >= 0) bar.dataset.sourceLine = sourceLine;
      bar.dataset.partIndex = partIndex;
      bar.dataset.tokenIndex = -1;
      bar.dataset.editKind = "measure";
      const number = document.createElement("span");
      number.className = "bar-number";
      number.textContent = measureNumber;
      bar.appendChild(number);

      const tokens = normalizeStackedTokens(part.replace(/:\|\||\|\|:|:|\|\|/g, "").split(/\s+/).filter(Boolean));
      const isGridBar = [4, 8, 16].includes(tokens.length) && tokens.some(isGridToken);
      const beatTokens = tokens.filter(token => isChordLikeToken(token));
      const beatStep = isGridBar ? beatsPerMeasure / tokens.length : (beatTokens.length ? beatsPerMeasure / beatTokens.length : beatsPerMeasure);
      let chordIndex = 0;
      tokens.forEach((token, tokenIndex) => {
        const chip = document.createElement("span");
        chip.className = "chord-chip";
        const beat = document.createElement("span");
        beat.className = "beat-mark";
        const isChord = isChordLikeToken(token);
        beat.textContent = isChord ? formatBeat(1 + (isGridBar ? tokenIndex : chordIndex) * beatStep) : "";
        const span = document.createElement("span");
        span.className = isGridToken(token)
          ? `grid-dot${isGridBar && isBeatGridIndex(tokenIndex, tokens.length) ? " beat-grid-dot" : ""}`
          : (isChord ? "chord" : "rhythm-mark");
        appendMusicalTokenContent(span, token);
        chip.append(beat, span);
        bar.appendChild(chip);
        if (isChord) chordIndex += 1;
      });
      row.appendChild(bar);
    }

    function appendSheetToken(lineEl, token, tokenIndex = -1, gridSize = 0) {
      const span = document.createElement("span");
      if (/^\|+$|^:\|\|$|^\|\|:$|^:?\|\|:?$/.test(token)) {
        span.className = "sheet-barline";
        appendAlignedBarline(span, token);
        lineEl.appendChild(span);
        return;
      } else if (isRhythmToken(token)) {
        span.className = "sheet-rhythm";
      } else if (isGridToken(token)) {
        span.className = `sheet-grid-dot${isBeatGridIndex(tokenIndex, gridSize) ? " beat-grid-dot" : ""}`;
        appendAlignedPlainToken(span, token);
        lineEl.appendChild(span);
        return;
      } else if (isChordLikeToken(token.replace(/:$/, ""))) {
        span.className = "sheet-chord";
      } else {
        span.className = "sheet-lyric";
      }
      appendMusicalTokenContent(span, token);
      lineEl.appendChild(span);
    }

    function renderSheet(text) {
      els.sheetView.innerHTML = "";
      text.split(/\r?\n/).forEach((line, lineIndex) => {
        const lineEl = document.createElement("div");
        lineEl.className = "sheet-line";
        lineEl.dataset.sourceLine = lineIndex;

        if (!line.trim()) {
          lineEl.textContent = " ";
          els.sheetView.appendChild(lineEl);
          return;
        }

        if (/^[^|]+:\s*$/.test(line.trim())) {
          const span = document.createElement("span");
          span.className = "sheet-section";
          span.textContent = line.trim();
          lineEl.appendChild(span);
          els.sheetView.appendChild(lineEl);
          return;
        }

        if (isCueLine(line)) {
          const span = document.createElement("span");
          span.className = "sheet-cue";
          span.textContent = line;
          lineEl.appendChild(span);
          els.sheetView.appendChild(lineEl);
          return;
        }

        if (line.includes("|") || isChordOnlyLine(line)) {
          let partIndex = 0;
          line.split(/(\|\|:|:\|\||\|)/).filter(part => part !== "").forEach(chunk => {
            if (/^\|\|:|:\|\||\|$/.test(chunk)) {
              appendSheetToken(lineEl, chunk);
              return;
            }

            const tokenParts = chunk.split(/(\s+)/).filter(part => part !== "");
            const musicalTokens = tokenParts.filter(part => !/^\s+$/.test(part));
            const displayTokens = normalizeStackedTokens(musicalTokens);
            const gridSize = [4, 8, 16].includes(displayTokens.length) && displayTokens.some(isGridToken) ? displayTokens.length : 0;
            const isMeasureChunk = displayTokens.length > 0 && displayTokens.every(isBarToken);
            const targetEl = isMeasureChunk ? document.createElement("span") : lineEl;
            if (isMeasureChunk) {
              targetEl.className = "sheet-measure";
              targetEl.dataset.sourceLine = lineIndex;
              targetEl.dataset.partIndex = partIndex;
              targetEl.dataset.tokenIndex = -1;
              targetEl.dataset.editKind = "measure";
            }
            let tokenIndex = 0;
            if (isMeasureChunk) {
              displayTokens.forEach((part, index) => {
                if (index > 0) targetEl.appendChild(document.createTextNode(" "));
                appendSheetToken(targetEl, part, tokenIndex, gridSize);
                tokenIndex += 1;
              });
              lineEl.appendChild(targetEl);
              partIndex += 1;
            } else {
              tokenParts.forEach(part => {
                if (/^\s+$/.test(part)) {
                  targetEl.appendChild(document.createTextNode(part));
                } else {
                  appendSheetToken(targetEl, part, tokenIndex, gridSize);
                  tokenIndex += 1;
                }
              });
            }
          });
        } else {
          const span = document.createElement("span");
          span.className = "sheet-lyric";
          span.textContent = line;
          lineEl.appendChild(span);
        }

        els.sheetView.appendChild(lineEl);
      });
      markActiveEditLine(els.sheetView);
    }

    function tokenClassForBeatGrid(token) {
      if (isGridToken(token)) return "beat-grid-dot";
      if (isRhythmToken(token)) return "beat-grid-rhythm";
      return isChordLikeToken(token) ? "beat-grid-chord" : "beat-grid-dot";
    }

    function visibleBeatSlots(itemsForBeat) {
      const slots = Array.from({ length: 4 }, (_, index) => itemsForBeat[index] || { token: ".", tokenIndex: index });
      const hasSecondHalf = !isGridToken(slots[2].token) || !isGridToken(slots[3].token);
      const hasSixteenth = !isGridToken(slots[1].token) || !isGridToken(slots[3].token);

      if (!hasSecondHalf && !hasSixteenth) {
        return [slots[0]];
      }

      if (!hasSixteenth) {
        return [slots[0], slots[2]];
      }

      return slots;
    }

    function renderBeatGridMeasure(part, row, measureNumber, sourceLine = -1, partIndex = 0) {
      const measure = document.createElement("div");
      measure.className = "beat-grid-measure";
      if (sourceLine >= 0) measure.dataset.sourceLine = sourceLine;
      measure.dataset.partIndex = partIndex;
      measure.dataset.tokenIndex = -1;
      measure.dataset.editKind = "measure";

      const number = document.createElement("span");
      number.className = "beat-grid-measure-number";
      number.textContent = measureNumber;
      measure.appendChild(number);

      const tokens = normalizeStackedTokens(cleanBarPart(part).split(/\s+/).filter(Boolean));
      const gridSize = [4, 8, 16].includes(tokens.length) && tokens.some(isGridToken) ? tokens.length : 0;
      const beatCells = Array.from({ length: 4 }, () => []);

      if (gridSize) {
        tokens.forEach((token, index) => {
          beatCells[Math.min(3, Math.floor(index * 4 / gridSize))].push({ token, tokenIndex: index });
        });
      } else {
        const musicalTokens = tokens
          .map((token, tokenIndex) => ({ token, tokenIndex }))
          .filter(item => isBarToken(item.token));
        musicalTokens.forEach((item, index) => {
          const beatIndex = Math.min(3, Math.floor(index * 4 / Math.max(1, musicalTokens.length)));
          beatCells[beatIndex].push(item);
        });
      }

      beatCells.forEach((itemsForBeat, beatIndex) => {
        const cell = document.createElement("div");
        cell.className = "beat-cell";
        cell.dataset.sourceLine = sourceLine;
        cell.dataset.partIndex = partIndex;
        cell.dataset.tokenIndex = itemsForBeat[0]?.tokenIndex ?? -1;
        const label = document.createElement("span");
        label.className = "beat-cell-label";
        label.textContent = String(beatIndex + 1);
        const content = document.createElement("div");
        content.className = "beat-cell-content";

        if (gridSize) {
          const subgrid = document.createElement("div");
          subgrid.className = "beat-subgrid";
          const slots = gridSize === 16
            ? visibleBeatSlots(itemsForBeat)
            : Array.from({ length: gridSize / 4 }, (_, index) => itemsForBeat[index] || { token: ".", tokenIndex: beatIndex * (gridSize / 4) + index });
          subgrid.style.gridTemplateColumns = `repeat(${slots.length}, 1fr)`;
          slots.forEach(item => {
            const slot = document.createElement("span");
            slot.className = `beat-slot ${tokenClassForBeatGrid(item.token)}`;
            appendMusicalTokenContent(slot, item.token);
            slot.contentEditable = "true";
            slot.spellcheck = false;
            slot.dataset.sourceLine = sourceLine;
            slot.dataset.partIndex = partIndex;
            slot.dataset.tokenIndex = item.tokenIndex;
            slot.dataset.editKind = "slot";
            slot.title = "クリックして編集";
            subgrid.appendChild(slot);
          });
          content.appendChild(subgrid);
        } else {
          const item = itemsForBeat.find(entry => !isGridToken(entry.token)) || itemsForBeat[0] || { token: "", tokenIndex: -1 };
          const token = item.token;
          const span = document.createElement("span");
          span.className = `beat-slot ${token ? tokenClassForBeatGrid(token) : "beat-grid-dot"}`;
          appendMusicalTokenContent(span, token);
          span.contentEditable = "true";
          span.spellcheck = false;
          span.dataset.sourceLine = sourceLine;
          span.dataset.partIndex = partIndex;
          span.dataset.tokenIndex = item.tokenIndex;
          span.dataset.editKind = "slot";
          span.title = "クリックして編集";
          content.appendChild(span);
        }

        cell.append(label, content);
        measure.appendChild(cell);
      });

      row.appendChild(measure);
    }

    function renderBeatGrid(text) {
      els.gridView.innerHTML = "";
      let measureCounter = 0;

      parseSections(text).forEach(section => {
        const wrap = document.createElement("section");
        wrap.className = "beat-grid-section";
        const title = document.createElement("div");
        title.className = "beat-grid-section-title";
        title.textContent = section.name;
        wrap.appendChild(title);

        section.lines.forEach(({ text: line, lineNumber }) => {
          if (!line.trim()) return;

          if (!line.includes("|")) {
            if (isChordOnlyLine(line)) {
              const row = document.createElement("div");
              row.className = "beat-grid-row";
              measureCounter += 1;
              renderBeatGridMeasure(line.trim(), row, measureCounter, lineNumber, 0);
              wrap.appendChild(row);
              return;
            }

            const lyric = document.createElement("div");
            lyric.className = "beat-grid-lyric";
            lyric.dataset.sourceLine = lineNumber;
            lyric.textContent = line.trim();
            wrap.appendChild(lyric);
            return;
          }

          const parts = line.split("|").map(part => part.trim()).filter(Boolean);
          if (!parts.some(isChordOnlyLine)) {
            const lyric = document.createElement("div");
            lyric.className = "beat-grid-lyric";
            lyric.dataset.sourceLine = lineNumber;
            lyric.textContent = line.trim();
            wrap.appendChild(lyric);
            return;
          }

          const row = document.createElement("div");
          row.className = "beat-grid-row";
          let partIndex = 0;
          parts.forEach(part => {
            if (!isChordOnlyLine(part)) return;
            measureCounter += 1;
            renderBeatGridMeasure(part, row, measureCounter, lineNumber, partIndex);
            partIndex += 1;
          });
          if (row.children.length) wrap.appendChild(row);
        });

        els.gridView.appendChild(wrap);
      });

      markActiveEditLine(els.gridView);
    }

    function renderChart(text) {
      els.chartView.innerHTML = "";
      let measureCounter = 0;
      const beatsPerMeasure = currentBeatsPerMeasure();
      parseSections(text).forEach(section => {
        const wrap = document.createElement("section");
        wrap.className = "section";

        const name = document.createElement("div");
        name.className = "section-name";
        name.textContent = section.name;

        const bars = document.createElement("div");
        bars.className = "bars";

        section.lines.forEach(lineItem => {
          const line = lineItem.text;
          const sourceLine = lineItem.lineNumber;
          if (!line.trim()) return;
          if (!line.includes("|")) {
            if (isChordOnlyLine(line)) {
              const row = document.createElement("div");
              row.className = "bar-row";
              measureCounter += 1;
              renderBarFromChords(line.trim(), row, beatsPerMeasure, measureCounter, sourceLine, 0);
              bars.appendChild(row);
              return;
            }

            renderPlainLine(line, bars, sourceLine);
            return;
          }

          const parts = line.split("|").map(part => part.trim()).filter(Boolean);
          if (!parts.some(isChordOnlyLine)) {
            renderPlainLine(line, bars, sourceLine);
            return;
          }

          const row = document.createElement("div");
          row.className = "bar-row";
          let partIndex = 0;
          parts.forEach(part => {
            if (!isChordOnlyLine(part)) {
              renderPlainLine(part, bars, sourceLine);
              return;
            }
            measureCounter += 1;
            renderBarFromChords(part, row, beatsPerMeasure, measureCounter, sourceLine, partIndex);
            partIndex += 1;
          });
          if (row.children.length) {
            bars.appendChild(row);
          }
        });

        wrap.append(name, bars);
        els.chartView.appendChild(wrap);
      });
      els.measureCount.textContent = measureCounter;
      els.beatCount.textContent = measureCounter * beatsPerMeasure;
      markActiveEditLine(els.chartView);
    }

    function update() {
      const targetIndex = mod(keyIndex(originalKey) + currentShift, 12);
      const targetKey = keyName(targetIndex, prefersFlatsForTarget(els.targetKey.value)) + keyMode(els.targetKey.value || originalKey);
      const preferFlats = prefersFlatsForTarget(targetKey);
      const output = transposeText(sourceChart, currentShift, preferFlats);

      els.targetKey.value = targetKey;
      els.originalKeyInput.value = originalKey;
      els.originalKeyRead.textContent = originalKey;
      els.nowKey.textContent = targetKey;
      els.songTitle.textContent = els.titleInput.value || "無題";
      els.metaLine.textContent = `キー ${targetKey} / BPM ${els.bpmInput.value || "122"} / ${els.meterInput.selectedOptions[0].textContent}`;
      renderSheet(output);
      renderBeatGrid(output);
      els.textView.textContent = output;
      renderChart(output);
      updateEditingLineInfo();
      saveState();
    }

    function setTargetKey(key) {
      currentShift = mod(keyIndex(key) - keyIndex(originalKey), 12);
      update();
    }

    function preserveSourceView(callback) {
      const input = els.sourceInput;
      const scrollTop = input.scrollTop;
      const scrollLeft = input.scrollLeft;
      const selectionStart = input.selectionStart ?? 0;
      const selectionEnd = input.selectionEnd ?? selectionStart;
      callback();
      requestAnimationFrame(() => {
        input.scrollTop = scrollTop;
        input.scrollLeft = scrollLeft;
        if (document.activeElement === input) {
          input.setSelectionRange(selectionStart, selectionEnd);
        }
      });
    }

    function applySourceEdit() {
      preserveSourceView(() => {
        sourceChart = els.sourceInput.value;
        update();
      });
    }

    function rememberSource(value = els.sourceInput.value) {
      const current = value;
      if (undoStack[undoStack.length - 1] !== current) {
        undoStack.push(current);
      }
      if (undoStack.length > 80) undoStack.shift();
    }

    function undoSourceEdit() {
      if (!undoStack.length) {
        els.status.textContent = "戻せる編集がありません";
        setTimeout(() => els.status.textContent = "", 1800);
        return;
      }
      els.sourceInput.value = undoStack.pop();
      applySourceEdit();
      els.status.textContent = "ひとつ戻しました";
      setTimeout(() => els.status.textContent = "", 1800);
    }

    function replaceSourceValue(value) {
      rememberSource();
      els.sourceInput.value = value;
      applySourceEdit();
    }

    function insertIntoSource(text, options = {}) {
      rememberSource();
      const input = els.sourceInput;
      sourceEditArmed = true;
      const scrollTop = input.scrollTop;
      const scrollLeft = input.scrollLeft;
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      const needsSpaceBefore = options.inline && before && !/[\s|]$/.test(before);
      const needsSpaceAfter = options.inline && after && !/^[\s|]/.test(after);
      const insertion = `${needsSpaceBefore ? " " : ""}${text}${needsSpaceAfter ? " " : ""}`;
      input.value = before + insertion + after;
      const cursor = before.length + insertion.length;
      input.focus({ preventScroll: true });
      input.setSelectionRange(cursor, cursor);
      input.scrollTop = scrollTop;
      input.scrollLeft = scrollLeft;
      applySourceEdit();
    }

    function setSelectedGridEditFromElement(element) {
      const sourceLine = Number.parseInt(element.dataset.sourceLine, 10);
      const partIndex = Number.parseInt(element.dataset.partIndex, 10);
      const tokenIndex = Number.parseInt(element.dataset.tokenIndex, 10);
      if (!Number.isInteger(sourceLine) || !Number.isInteger(partIndex)) return false;
      selectedGridEdit = {
        sourceLine,
        partIndex,
        tokenIndex: Number.isInteger(tokenIndex) ? tokenIndex : -1
      };
      selectSourceLine(sourceLine, false);
      markSelectedGridEdit();
      return true;
    }

    function fillGridEditorFromSelection() {
      if (!selectedGridEdit) return;
      const line = els.sourceInput.value.split("\n")[selectedGridEdit.sourceLine] || "";
      const tokens = sourcePartTokens(line, selectedGridEdit.partIndex).map(tokenForDisplay);
      els.grid16Inputs.forEach((input, index) => {
        input.value = tokens[index] && tokens[index] !== "." ? tokens[index] : "";
      });
      const nextInput = selectedGridEdit.tokenIndex >= 0 ? els.grid16Inputs[selectedGridEdit.tokenIndex] : els.grid16Inputs[0];
      if (nextInput && !nextInput.classList.contains("hidden")) {
        activeGridInput = nextInput;
      }
    }

    function replaceSelectedGridToken(nextToken) {
      if (!selectedGridEdit || selectedGridEdit.tokenIndex < 0) return false;
      const lines = els.sourceInput.value.split("\n");
      const line = lines[selectedGridEdit.sourceLine] || "";
      const tokens = sourcePartTokens(line, selectedGridEdit.partIndex);
      while (tokens.length <= selectedGridEdit.tokenIndex) tokens.push(".");
      const currentDisplayToken = tokenForDisplay(tokens[selectedGridEdit.tokenIndex] || "");
      tokens[selectedGridEdit.tokenIndex] = tokenForSource(mergedGridPopupValue(nextToken, currentDisplayToken));
      rememberSource();
      lines[selectedGridEdit.sourceLine] = replaceChordPartInLine(line, selectedGridEdit.partIndex, tokens.join(" "));
      els.sourceInput.value = lines.join("\n");
      applySourceEdit();
      selectedGridEdit = { ...selectedGridEdit };
      selectSourceLine(selectedGridEdit.sourceLine, false);
      els.status.textContent = "選択した拍を更新しました";
      setTimeout(() => els.status.textContent = "", 1400);
      return true;
    }

    function replaceSelectedGridMeasureFromInputs() {
      if (!selectedGridEdit) return false;
      const lines = els.sourceInput.value.split("\n");
      const line = lines[selectedGridEdit.sourceLine] || "";
      const tokens = els.grid16Inputs.map(input => {
        return tokenForSource(input.value.trim() || ".");
      });
      rememberSource();
      lines[selectedGridEdit.sourceLine] = replaceChordPartInLine(line, selectedGridEdit.partIndex, tokens.join(" "));
      els.sourceInput.value = lines.join("\n");
      applySourceEdit();
      selectSourceLine(selectedGridEdit.sourceLine, false);
      els.status.textContent = "選択した小節を更新しました";
      setTimeout(() => els.status.textContent = "", 1400);
      return true;
    }

    function previewSelectedGridMeasureFromInputs() {
      if (!selectedGridEdit) return false;
      const lines = els.sourceInput.value.split("\n");
      const line = lines[selectedGridEdit.sourceLine] || "";
      const tokens = els.grid16Inputs.map(input => tokenForSource(input.value.trim() || "."));
      lines[selectedGridEdit.sourceLine] = replaceChordPartInLine(line, selectedGridEdit.partIndex, tokens.join(" "));
      els.sourceInput.value = lines.join("\n");
      applySourceEdit();
      selectSourceLine(selectedGridEdit.sourceLine, false);
      return true;
    }

    function normalizeEditedGridToken(value) {
      return normalizeRhythmSymbols(value.replace(/・/g, ".")).trim() || ".";
    }

    function commitBeatSlotEdit(slot) {
      if (!setSelectedGridEditFromElement(slot)) return;
      const value = normalizeEditedGridToken(slot.textContent);
      replaceSelectedGridToken(value);
    }

    function selectEditableTarget(target, selectedMessage = "小節を選択しました", lineMessage = "行を選択しました") {
      if (setSelectedGridEditFromElement(target)) {
        sourceEditArmed = false;
        fillGridEditorFromSelection();
        els.status.textContent = selectedMessage;
        setTimeout(() => els.status.textContent = "", 1200);
        return true;
      }
      if (target.dataset.sourceLine !== undefined) {
        selectedGridEdit = null;
        selectSourceLine(Number.parseInt(target.dataset.sourceLine, 10));
        els.status.textContent = lineMessage;
        setTimeout(() => els.status.textContent = "", 1200);
        return true;
      }
      return false;
    }

    function normalizeBarInput(value) {
      const trimmed = value.trim();
      if (!trimmed) return "| C | F | G | C |";
      if (trimmed.includes("|")) {
        return trimmed;
      }
      return `| ${trimmed} |`;
    }

    function insertIntoBarInput(text) {
      if (activeGridInput) {
        activeGridInput.value = mergedGridPopupValue(text, activeGridInput.value);
        activeGridInput.dispatchEvent(new Event("input", { bubbles: true }));
        const index = els.grid16Inputs.indexOf(activeGridInput);
        const next = els.grid16Inputs.slice(index + 1).find(input => !input.classList.contains("hidden"));
        if (next) {
          next.focus();
          activeGridInput = next;
        }
        return;
      }
      const input = els.barBuilderInput;
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      const spacerBefore = before && !/\s$/.test(before) ? " " : "";
      const spacerAfter = after && !/^\s/.test(after) ? " " : "";
      input.value = before + spacerBefore + text + spacerAfter + after;
      const cursor = (before + spacerBefore + text + spacerAfter).length;
      input.focus();
      input.setSelectionRange(cursor, cursor);
    }

    function gridInputLabel(input) {
      const index = els.grid16Inputs.indexOf(input);
      if (index < 0) return "grid";
      const beat = Math.floor(index / 4) + 1;
      const slot = ["1", "e", "+", "a"][index % 4];
      return `beat ${beat} / ${slot}`;
    }

    function closeGridChordPopup() {
      if (gridChordPopup) gridChordPopup.classList.remove("open");
    }

    function mergedGridPopupValue(value, currentValue) {
      const current = currentValue.trim();
      if (value === "." || value === "") return value;
      if (isRhythmToken(value)) {
        return isChordLikeToken(current) ? value + chordPartFromToken(current) : value;
      }
      if (isChordLikeToken(value)) {
        const prefix = rhythmPrefix(current) || (isRhythmToken(current) ? current : "");
        return prefix + value;
      }
      return value;
    }

    function visibleGridInputs() {
      return els.grid16Inputs.filter(input => !input.classList.contains("hidden"));
    }

    function ensureActiveGridInput() {
      if (activeGridInput && !activeGridInput.classList.contains("hidden")) return activeGridInput;
      activeGridInput = visibleGridInputs()[0] || els.grid16Inputs[0] || null;
      return activeGridInput;
    }

    function commitGridInputChange(input) {
      if (!input) return;
      input.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function applyGridSymbol(symbol) {
      const input = ensureActiveGridInput();
      if (!input) return;
      activeGridInput = input;
      input.value = mergedGridPopupValue(symbol, input.value);
      commitGridInputChange(input);
      closeGridChordPopup();
      input.focus({ preventScroll: true });
      input.select();
    }

    function clearGridSymbol() {
      const input = ensureActiveGridInput();
      if (!input) return;
      activeGridInput = input;
      const current = input.value.trim();
      input.value = isRhythmToken(current) ? "" : chordPartFromToken(current);
      commitGridInputChange(input);
      closeGridChordPopup();
      input.focus({ preventScroll: true });
      input.select();
    }

    function setGridInputFromPopup(value) {
      if (!activeGridInput) return;
      const mergedValue = mergedGridPopupValue(value, activeGridInput.value);
      activeGridInput.value = mergedValue === "." ? "" : mergedValue;
      activeGridInput.dispatchEvent(new Event("input", { bubbles: true }));
      const index = els.grid16Inputs.indexOf(activeGridInput);
      const next = els.grid16Inputs.slice(index + 1).find(input => !input.classList.contains("hidden"));
      if (next) {
        activeGridInput = next;
        next.focus({ preventScroll: true });
        openGridChordPopup(next);
      } else {
        closeGridChordPopup();
        activeGridInput.focus({ preventScroll: true });
        activeGridInput.select();
      }
    }

    function targetKeyRootIndex() {
      const targetIndex = mod(keyIndex(originalKey) + currentShift, 12);
      return Number.isInteger(targetIndex) ? targetIndex : 0;
    }

    function currentKeyChordChoices() {
      const preferFlats = prefersFlatsForTarget(els.targetKey.value || originalKey);
      const tonic = targetKeyRootIndex();
      const majorScale = [0, 2, 4, 5, 7, 9, 11];
      const triads = ["", "m", "m", "", "", "m", "m7b5"];
      const sevenths = ["M7", "m7", "m7", "M7", "7", "m7", "m7b5"];
      return [
        ...majorScale.map((step, index) => `${keyName(tonic + step, preferFlats)}${triads[index]}`),
        ...majorScale.map((step, index) => `${keyName(tonic + step, preferFlats)}${sevenths[index]}`),
        `${keyName(tonic, preferFlats)}sus4`,
        `${keyName(tonic, preferFlats)}add9`
      ];
    }

    function currentKeySlashChordChoices() {
      const preferFlats = prefersFlatsForTarget(els.targetKey.value || originalKey);
      const tonic = targetKeyRootIndex();
      const note = offset => keyName(tonic + offset, preferFlats);
      return [
        `${note(0)}/${note(4)}`,
        `${note(0)}/${note(7)}`,
        `${note(5)}/${note(9)}`,
        `${note(7)}/${note(11)}`,
        `${note(9)}m/${note(7)}`,
        `${note(2)}m/${note(5)}`,
        `${note(4)}m/${note(7)}`,
        `${note(7)}7/${note(11)}`,
        `${note(0)}M7/${note(4)}`,
        `${note(5)}M7/${note(9)}`,
        `${note(2)}m7/${note(5)}`,
        `${note(9)}m7/${note(0)}`
      ];
    }

    function fillPopupSectionButtons(section, values, className = "") {
      const buttons = section.querySelector(".grid-chord-popup-buttons");
      buttons.innerHTML = "";
      values.forEach(value => {

          ? createPopupButton(value[0], value[1], value[2] || className)
          : createPopupButton(value, value, className));

      const button = document.createElement("button");

      button.textContent = label;

      button.addEventListener("click", () => setGridInputFromPopup(value));

    function appendPopupSection(parent, label, values, className = "") {
      const section = document.createElement("div");
      section.className = "grid-chord-popup-section";
      const title = document.createElement("div");
      title.className = "grid-chord-popup-label";
      title.textContent = label;
      const buttons = document.createElement("div");
      buttons.className = "grid-chord-popup-buttons";
      section.dataset.popupSection = label;
      values.forEach(value => {

          ? createPopupButton(value[0], value[1], value[2] || className)
          : createPopupButton(value, value, className));

    function ensureGridChordPopup() {
      if (gridChordPopup) return gridChordPopup;
      gridChordPopup = document.createElement("div");

      gridChordPopup.setAttribute("role", "dialog");

      appendPopupSection(gridChordPopup, "ルート", ["C", "C#", "Db", "D", "D#", "Eb", "E", "F", "F#", "Gb", "G", "G#", "Ab", "A", "A#", "Bb", "B"]);
      document.body.appendChild(gridChordPopup);
      return gridChordPopup;
    }

    function openGridChordPopup(input) {
      if (!input || input.classList.contains("hidden")) return;
      activeGridInput = input;
      sourceEditArmed = false;
      const popup = ensureGridChordPopup();
      const title = popup.querySelector("[data-popup-title]");
      if (title) title.textContent = `${gridInputLabel(input)} に入れるコード`;
      const keySection = popup.querySelector('[data-popup-section="現在キー"]');
      if (keySection) fillPopupSectionButtons(keySection, currentKeyChordChoices());
      const slashSection = popup.querySelector('[data-popup-section="オンコード"]');
      if (slashSection) fillPopupSectionButtons(slashSection, currentKeySlashChordChoices());
      popup.classList.add("open");

      const rect = input.getBoundingClientRect();
      const width = Math.min(340, window.innerWidth - 24);
      let left = Math.min(window.innerWidth - width - 12, Math.max(12, rect.left));
      let top = rect.bottom + 8;
      popup.style.width = `${width}px`;
      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
      const popupRect = popup.getBoundingClientRect();
      if (popupRect.bottom > window.innerHeight - 12) {
        top = Math.max(12, rect.top - popupRect.height - 8);
        popup.style.top = `${top}px`;
      }
    }

      const qualities = ["", "m", "7", "m7", "M7", "M7(9)", "mM7", "6", "m6", "dim7", "sus4", "add9", "7sus4", "m7(11)", "m7(9)"];

    function gridBarText() {
      const tokens = els.grid16Inputs.map(input => input.value.trim() || ".");
      return `| ${tokens.join(" ")} |`;
    }

    function currentGridSize() {
      return Number.parseInt(els.gridResolutionInput.value, 10) || 16;
    }

    function tokensToGridBar(tokens, gridSize = currentGridSize()) {
      const grid = Array(gridSize).fill(".");
      const count = Math.min(tokens.length, gridSize);
      tokens.slice(0, count).forEach((token, index) => {
        const slot = Math.min(gridSize - 1, Math.floor(index * gridSize / count));
        grid[slot] = token;
      });
      return `| ${grid.join(" ")} |`;
    }

    function autoGridText(text) {
      return text.split(/\r?\n/).map(line => {
        if (!line.trim() || line.includes("|") || !isChordOnlyLine(line)) {
          return line;
        }
        const tokens = barTokensFromLine(line);
        const gridSize = currentGridSize();
        if (tokens.length <= gridSize) {
          return tokensToGridBar(tokens);
        }
        const bars = [];
        for (let i = 0; i < tokens.length; i += gridSize) {
          bars.push(tokensToGridBar(tokens.slice(i, i + gridSize), gridSize));
        }
        return bars.join("\n");
      }).join("\n");
    }
